// ═══════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════
function ctxMenu(ev, p, type) {
  ev.preventDefault(); ev.stopPropagation();
  if (!selected.has(p)) { selected.clear(); selected.add(p); lastSel=p; renderFiles(); selUI(); }
  document.querySelectorAll('.ctxmenu').forEach(e=>e.remove());
  const entry = filtered.find(x=>x.path===p);
  const multi = selected.size > 1;
  const m = document.createElement('div');
  m.className = 'ctxmenu';

  // Safe menu items using closures - no path string injection
  const menuItems = [];
  if (!multi && type==='directory') menuItems.push({icon:'📂', label:'Open',             fn:()=>dblItem(p,type)});
  if (!multi && type==='file') {
    const ext = p.split('.').pop().toLowerCase();
    if (EDITABLE_EXTS_UI.has(ext)) {
      menuItems.push({icon:'✏', label:'Edit',    fn:()=>openEditor(p)});
    }
    menuItems.push({icon:'👁', label:'Preview',  fn:()=>previewFile(p)},
                   {icon:'↓', label:'Download',  fn:()=>dlFile(p)});
  }
  menuItems.push({sep:true});
  menuItems.push({icon:'⎘', label:'Copy',          fn:()=>copySel()});
  menuItems.push({icon:'✂', label:'Cut',           fn:()=>cutSel()});
  if (clipboard) menuItems.push({icon:'⊞', label:'Paste here', fn:()=>doPaste()});
  menuItems.push({sep:true});
  if (!multi && entry) menuItems.push({icon:'✏', label:'Rename',     fn:()=>showRename(p, entry.name||'')});
  menuItems.push({icon:'ℹ', label:'Properties',    fn:()=>showProps(p)});
  menuItems.push({sep:true});
  // ── Pin to Places (directories only) ────────────────────────
  if (!multi && type === 'directory') {
    menuItems.push({icon:'📌', label:'Pin to Places', fn:()=>pinToPlaces(p, entry ? entry.name : p.split('/').pop())});
  }
  // ── Zip / Unzip ───────────────────────────────────────────────
  if (!multi) {
    const ext = p.split('.').pop().toLowerCase();
    if (ext === 'zip') {
      menuItems.push({icon:'📦', label:'Unzip here', fn:()=>doUnzip(p)});
    } else {
      menuItems.push({icon:'🗜', label:'Zip…',        fn:()=>doZipSelected(p, type)});
    }
  } else {
    menuItems.push({icon:'🗜', label:'Zip selected…',      fn:()=>doZipSelected(null, null)});
    menuItems.push({icon:'↓', label:'Download selected…', fn:()=>dlMultiSel()});
  }
  // ── AI Actions ────────────────────────────────────────────────
  if (!multi && entry) {
    const isImg = IMAGE_EXTS_UI.has((entry.name.split('.').pop()||'').toLowerCase()) ||
                  (entry.mime && entry.mime.startsWith('image/'));
    // ── Broken symlink actions ────────────────────────────────
    if (type === 'symlink-broken') {
      menuItems.push({sep:true});
      menuItems.push({icon:'🔧', label:'Fix Broken Link…',    fn:()=>fixBrokenSymlink(p, entry.linkTarget||'')});
      menuItems.push({icon:'🗑', label:'Delete Broken Link',  fn:()=>deleteBrokenSymlink(p), red:true});
    } else if (isImg) {
      menuItems.push({icon:'✦', label:'AI Describe Image', fn:()=>aiDescribeImage(p, entry.name)});
    } else if (type === 'directory') {
      menuItems.push({icon:'✦', label:'Ask AI…',            fn:()=>{ if(!_aiSidebarOpen) toggleAISidebar(); else { const i=document.getElementById('ai-chat-input'); if(i) i.focus(); } }});
      menuItems.push({icon:'✦', label:'AI Task…',           fn:()=>showAITask(p)});
      menuItems.push({icon:'✦', label:'AI Summarize',       fn:()=>aiSummarize(p, entry.name)});
      menuItems.push({icon:'✦', label:'AI Suggest Name',    fn:()=>aiSuggestName(p, entry.name)});
    } else {
      menuItems.push({icon:'✦', label:'AI Summarize',      fn:()=>aiSummarize(p, entry.name)});
      menuItems.push({icon:'✦', label:'AI Suggest Name',   fn:()=>aiSuggestName(p, entry.name)});
      menuItems.push({icon:'✦', label:'AI Tag File',       fn:()=>aiTag(p, entry.name)});
    }
  }
  menuItems.push({sep:true});
  menuItems.push({icon:'🗑', label:'Move to Trash',      fn:()=>delSel(),  red:true});
  menuItems.push({icon:'💀', label:'Delete Permanently', fn:()=>permDel(), red:true});

  menuItems.forEach((item, idx) => {
    if (item.sep) {
      const sep = document.createElement('div'); sep.className='ctx-sep'; m.appendChild(sep);
    } else {
      const el = document.createElement('div');
      el.className = 'ctx-item' + (item.red ? ' red' : '');
      el.innerHTML = `<span class="ctx-ico">${item.icon}</span>${esc(item.label)}`;
      el.addEventListener('click', () => {
        m.remove();
        document.removeEventListener('click', dismiss);
        // Use 150ms delay — ensures the click event fully propagates and dismiss handler
        // has already fired/cleared before item.fn() tries to open a new modal
        setTimeout(() => item.fn(), 150);
      });
      m.appendChild(el);
    }
  });

  const {innerWidth:W,innerHeight:H}=window;
  let x=ev.clientX,y=ev.clientY;
  document.body.appendChild(m);
  // On mobile, CSS handles positioning as bottom sheet — skip JS left/top
  if (W > 600 && !window.matchMedia('(pointer: coarse)').matches) {
    const r=m.getBoundingClientRect();
    if(x+r.width>W)x=W-r.width-8;
    if(y+r.height>H)y=H-r.height-8;
    m.style.left=x+'px'; m.style.top=y+'px';
  }
  const openedAt = Date.now();
  // Ignore dismiss events within 350ms of opening — swallows the touchend
  // from the long-press finger lift so the menu doesn't instantly vanish.
  const dismiss = e => {
    if (Date.now() - openedAt < 350) return;
    if (!m.contains(e.target)) {
      m.remove();
      document.removeEventListener('click', dismiss);
      document.removeEventListener('touchend', dismiss);
    }
  };
  setTimeout(() => {
    document.addEventListener('click', dismiss);
    document.addEventListener('touchend', dismiss, { passive: true });
  }, 50);
}

// ═══════════════════════════════════════════
function previewFile(p) {
  const e = filtered.find(x=>x.path===p);
  if (!e) return;
  const mime = e.mime||'', ext = e.name.split('.').pop().toLowerCase();
  const m = mkModal();
  if (mime.startsWith('image/')) {
    m.innerHTML = `<h2>🖼 ${esc(e.name)}</h2><img src="/api/preview?path=${enc(p)}" style="max-width:100%;max-height:58vh;border-radius:8px;margin-bottom:16px;display:block"><div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button><button class="mbtn ok" onclick="dlFile('${esc(p)}')">↓ Download</button></div>`;
  } else if (mime.startsWith('video/')) {
    m.innerHTML = `<h2>🎬 ${esc(e.name)}</h2><video controls src="/api/preview?path=${enc(p)}" style="max-width:100%;max-height:58vh;border-radius:8px;margin-bottom:16px"></video><div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button></div>`;
  } else if (mime.startsWith('text/')||['json','yaml','yml','toml','xml','sh','py','js','ts','md','log','conf','cfg','env','rs','go','rb'].includes(ext)) {
    m.innerHTML = `<h2>📝 ${esc(e.name)}</h2><p>Loading…</p>`;
    fetch(`/api/preview?path=${enc(p)}`).then(r=>r.text()).then(txt=>{
      m.innerHTML = `<h2>📝 ${esc(e.name)}</h2><pre style="background:var(--surface2);border-radius:8px;padding:14px;overflow:auto;max-height:55vh;font-family:var(--font-mono);font-size:12px;color:var(--text2);border:1px solid var(--border);margin-bottom:16px;white-space:pre-wrap;line-height:1.5">${esc(txt.slice(0,80000))}</pre><div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button><button class="mbtn ok" onclick="dlFile('${esc(p)}')">↓ Download</button></div>`;
    });
  } else {
    m.innerHTML = `<h2>📄 ${esc(e.name)}</h2><p>No preview available.<br><span style="font-family:var(--font-mono);font-size:12px;color:var(--text3)">${mime||'unknown type'} · ${fmtSize(e.size)}</span></p><div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button><button class="mbtn ok" onclick="dlFile('${esc(p)}')">↓ Download</button></div>`;
  }
}
function showProps(p) {
  const e = filtered.find(x => x.path === p);
  if (!e) { toast('Item not found in current view', 'err'); return; }

  const isDir    = e.type === 'directory' || e.type === 'symlink-dir';
  const isBroken = e.type === 'symlink-broken';
  const icon = isDir
    ? `<div style="text-align:center;font-size:44px;margin-bottom:14px">&#128193;</div>`
    : (e.mime && e.mime.startsWith('image/') && !e.isSymlink
        ? `<img src="/api/preview?path=${enc(p)}" style="max-width:100%;max-height:130px;object-fit:contain;border-radius:8px;display:block;margin:0 auto 14px" onerror="this.style.display='none'">`
        : `<div style="text-align:center;font-size:44px;margin-bottom:14px">${fileIcon(e)}</div>`);

  const m = mkModal();

  function renderTable(sizeVal) {
    let typeLabel = isDir ? 'Directory' : (e.mime || 'File');
    if (e.isSymlink) typeLabel += isBroken ? ' (broken symlink)' : ' (symlink)';
    const rows = [
      ['Name',        esc(e.name)],
      ['Path',        esc(e.path)],
      ['Type',        esc(typeLabel)],
    ];
    if (e.isSymlink) rows.push(['→ Target', `<span style="font-family:var(--font-mono);color:${isBroken?'var(--red)':'var(--accent3)'}">${esc(e.linkTarget||'unknown')}</span>`]);
    rows.push(
      ['Size',        sizeVal],
      ['Modified',    esc(fmtDate(e.modified))],
      ['Permissions', esc(e.permissions || '—')],
    );
    return rows.map(([k,v]) => `<tr>
      <td style="color:var(--text3);padding:7px 0;width:100px;vertical-align:top;font-family:var(--font-sans);font-size:12px">${k}</td>
      <td style="color:var(--text);padding:7px 0;font-family:var(--font-mono);font-size:11.5px;word-break:break-all" id="prop-${k.toLowerCase()}">${v}</td>
    </tr>`).join('');
  }

  const initialSize = isDir
    ? `<span id="prop-dirsize-val" style="color:var(--text3);font-style:italic">Calculating…</span>`
    : esc(fmtSize(e.size));

  m.innerHTML = `<h2>&#8505; Properties</h2>
    <div style="background:var(--surface2);border-radius:10px;padding:16px;border:1px solid var(--border);margin-bottom:16px">
      ${icon}
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        ${renderTable(initialSize)}
      </table>
    </div>
    <div class="modal-row">
      <button class="mbtn" onclick="closeModal()">Close</button>
      ${isBroken ? `<button class="mbtn" id="fix-sym-btn" data-path="${esc(p)}" data-target="${esc(e.linkTarget||'')}">🔧 Fix Link</button>` : ''}
      ${isBroken ? `<button class="mbtn" id="del-sym-btn" data-path="${esc(p)}" style="color:var(--red)">🗑 Delete Broken Link</button>` : ''}
      ${!isDir && !isBroken ? `<button class="mbtn ok" onclick="dlFile('${esc(p)}')">&#8595; Download</button>` : ''}
    </div>`;

  // Wire up symlink action buttons (uses data-* to avoid escaping issues)
  const fixBtn = m.querySelector('#fix-sym-btn');
  if (fixBtn) fixBtn.addEventListener('click', () => fixBrokenSymlink(fixBtn.dataset.path, fixBtn.dataset.target));
  const delBtn = m.querySelector('#del-sym-btn');
  if (delBtn) delBtn.addEventListener('click', () => deleteBrokenSymlink(delBtn.dataset.path));

  // For directories: stream size via SSE — no blocking, updates live
  if (isDir) {
    const evtSrc = new EventSource(`/api/dirsize?path=${enc(p)}`);
    let done = false;
    evtSrc.onmessage = ev => {
      try {
        const d = JSON.parse(ev.data);
        const el = document.getElementById('prop-dirsize-val');
        if (!el) { evtSrc.close(); return; }
        if (d.done) {
          done = true;
          evtSrc.close();
          const sizeStr = fmtSize(d.size || 0);
          const fileStr = d.files ? ` (${d.files.toLocaleString()} files)` : '';
          const note    = d.partial ? ' ~' : '';
          el.textContent = note + sizeStr + fileStr;
          el.style.cssText = d.partial ? 'color:var(--text2);font-style:italic' : '';
        } else if (d.error) {
          done = true;
          evtSrc.close();
          el.textContent = 'Permission denied';
          el.style.color = 'var(--text3)';
          el.style.fontStyle = 'italic';
        }
      } catch {}
    };
    evtSrc.onerror = () => {
      // SSE errors usually mean the stream closed cleanly after sending data,
      // or a transient reconnect. Only show a message if we truly got no data.
      evtSrc.close();
      if (!done) {
        const el = document.getElementById('prop-dirsize-val');
        if (el && (el.textContent === 'Calculating…' || el.textContent === '')) {
          el.textContent = 'Unavailable';
          el.style.color = 'var(--text3)';
          el.style.fontStyle = 'italic';
        }
      }
    };
    // Clean up if modal closed before stream finishes
    const obs = new MutationObserver(() => {
      if (!document.getElementById('prop-dirsize-val')) { evtSrc.close(); obs.disconnect(); }
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }
}
function dlFile(p) { window.location.href = `/api/download?path=${enc(p)}`; }

async function dlMultiSel() {
  const sel = [...selected];
  if (!sel.length) return;
  // Single item — direct download
  if (sel.length === 1) { dlFile(sel[0]); return; }
  // Multiple items — zip on server then download
  const zipName  = `download-${Date.now()}.zip`;
  const destPath = curPath.replace(/\/+$/, '') + '/' + zipName;
  toast(`⏳ Preparing zip of ${sel.length} items…`, 'ok');
  try {
    const r = await fetch('/api/zip', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ sources: sel, destination: destPath, clientId: wsId })
    });
    const d = await r.json();
    if (!d.jobId) { toast('Failed to start zip', 'err'); return; }
    // Poll until done
    await new Promise((resolve, reject) => {
      const poll = setInterval(async () => {
        try {
          const jr = await fetch('/api/jobs');
          const jd = await jr.json();
          const job = (jd.jobs || []).find(j => j.jobId === d.jobId);
          if (!job) { clearInterval(poll); reject(new Error('Job lost')); return; }
          if (job.status === 'done') { clearInterval(poll); resolve(); }
          else if (job.status === 'error' || job.status === 'cancelled') {
            clearInterval(poll); reject(new Error(job.error || 'Zip failed'));
          }
        } catch (e) { clearInterval(poll); reject(e); }
      }, 500);
    });
    window.location.href = `/api/download?path=${enc(destPath)}`;
    // Clean up temp zip after browser starts download
    setTimeout(async () => {
      try {
        await fetch('/api/delete-permanent', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ paths: [destPath] })
        });
      } catch {}
      reload();
    }, 4000);
  } catch(e) {
    toast('Download failed: ' + e.message, 'err');
  }
}

// ═══════════════════════════════════════════
// FILE EDITOR
// ═══════════════════════════════════════════
// editorTabs: [{ path, content, savedContent, dirty, loaded }]
// activeTabIdx: index into editorTabs
// _editorModal: live DOM node of the editor modal (null when closed)
let editorTabs   = [];
let activeTabIdx = 0;
let _editorModal = null;

// ─── open or focus a file in the multi-tab editor ─────────────────
function openEditor(p) {
  // Already open? → switch to that tab
  const existing = editorTabs.findIndex(t => t.path === p);
  if (existing !== -1 && _editorModal) {
    activeTabIdx = existing;
    _edRenderTabs();
    _edShowTab(activeTabIdx);
    return;
  }

  editorTabs.push({ path: p, content: '', savedContent: '', dirty: false, loaded: false });
  activeTabIdx = editorTabs.length - 1;

  if (_editorModal) {          // editor already open — add tab & load
    _edRenderTabs();
    _edLoadTab(activeTabIdx);
    return;
  }

  // ── Build the editor modal ────────────────────────────────────
  const m = mkModal();
  m.classList.add('editor-modal');
  _editorModal = m;

  m.innerHTML = `
    <div class="editor-wrap">
      <div class="editor-tabs" id="ed-tabs"></div>
      <div class="editor-toolbar">
        <span class="editor-filename" id="ed-name"></span>
        <span class="editor-status" id="ed-status">Loading\u2026</span>
        <button class="mbtn" style="padding:4px 12px;font-size:12px" id="ed-close">\u2715 Close</button>
        <button class="mbtn ok" style="padding:4px 14px;font-size:12px" id="ed-save" onclick="saveEditor()" disabled>Save</button>
      </div>
      <textarea class="editor-textarea" id="ed-area" spellcheck="false"></textarea>
      <div class="editor-footer">
        <span style="font-size:11px;color:var(--text3);font-family:var(--font-mono)" id="ed-info">\u2014</span>
        <span style="font-size:11px;color:var(--text3)">Ctrl+S save \u00b7 Ctrl+W close tab</span>
      </div>
    </div>`;

  document.getElementById('ed-close').addEventListener('click', _edCloseAll);

  // Prevent overlay-click from bypassing dirty check
  const ov = m.parentElement;
  if (ov) ov.onclick = ev => { if (ev.target === ov) _edCloseAll(); };

  const ta = document.getElementById('ed-area');
  ta.addEventListener('input', () => {
    const tab = editorTabs[activeTabIdx];
    if (!tab) return;
    const was = tab.dirty;
    tab.content = ta.value;
    tab.dirty   = ta.value !== tab.savedContent;
    if (tab.dirty !== was) { _edRenderTabs(); _edUpdateStatus(); }
    const sv = document.getElementById('ed-save');
    if (sv) sv.disabled = !tab.dirty;
    const info = document.getElementById('ed-info');
    if (info) info.textContent = `${ta.value.split('\n').length.toLocaleString()} lines \u00b7 ${fmtSize(new Blob([ta.value]).size)}`;
  });
  ta.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveEditor(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'w') { e.preventDefault(); _edCloseTab(activeTabIdx); }
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = ta.selectionStart, en = ta.selectionEnd;
      ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(en);
      ta.selectionStart = ta.selectionEnd = s + 2;
      ta.dispatchEvent(new Event('input'));
    }
  });

  _edRenderTabs();
  _edLoadTab(activeTabIdx);
}

function _edRenderTabs() {
  const bar = document.getElementById('ed-tabs');
  if (!bar) return;
  bar.innerHTML = editorTabs.map((t, i) => {
    const name = t.path.split('/').pop();
    return `<div class="editor-tab${i === activeTabIdx ? ' active' : ''}" data-i="${i}">` +
           `<span class="editor-tab-name">${esc(name)}</span>` +
           (t.dirty ? `<span class="editor-tab-dot">\u25cf</span>` : '') +
           `<span class="editor-tab-x" data-xi="${i}" title="Close tab">\u00d7</span>` +
           `</div>`;
  }).join('') +
  `<div class="editor-tab-new" id="ed-tab-new" title="Open file in new tab">+</div>`;

  bar.querySelectorAll('.editor-tab').forEach(el => {
    el.addEventListener('click', ev => {
      if (ev.target.closest('.editor-tab-x')) return;
      const idx = parseInt(el.dataset.i);
      if (idx !== activeTabIdx) { activeTabIdx = idx; _edRenderTabs(); _edShowTab(idx); }
    });
  });
  bar.querySelectorAll('.editor-tab-x').forEach(el => {
    el.addEventListener('click', ev => { ev.stopPropagation(); _edCloseTab(parseInt(el.dataset.xi)); });
  });
  const addBtn = document.getElementById('ed-tab-new');
  if (addBtn) addBtn.addEventListener('click', () => {
    const m2 = mkModal();
    m2.innerHTML = `<h2>Open file in new tab</h2>
      <p style="color:var(--text3);font-size:12.5px">Enter the full path of the file to open:</p>
      <input class="modal-input" id="ed-open-path" value="${esc(curPath.replace(/\/+$/, '') + '/')}" autofocus>
      <div class="modal-row">
        <button class="mbtn" onclick="closeModal()">Cancel</button>
        <button class="mbtn ok" onclick="_edOpenPath()">Open</button>
      </div>`;
    setTimeout(() => {
      const i = document.getElementById('ed-open-path');
      if (i) { i.focus(); i.setSelectionRange(i.value.length, i.value.length); }
    }, 80);
  });
}

window._edOpenPath = function() {
  const v = (document.getElementById('ed-open-path')?.value || '').trim();
  closeModal();
  if (v) setTimeout(() => openEditor(v), 80);
};

async function _edLoadTab(idx) {
  const tab = editorTabs[idx];
  if (!tab || tab.loaded) { _edShowTab(idx); return; }
  const ta = document.getElementById('ed-area');
  if (!ta) return;
  ta.value = ''; ta.placeholder = 'Loading\u2026';
  const st = document.getElementById('ed-status');
  const sv = document.getElementById('ed-save');
  if (st) { st.textContent = 'Loading\u2026'; st.style.color = 'var(--text3)'; }
  if (sv) sv.disabled = true;
  try {
    const r = await fetch(`/api/file/read?path=${enc(tab.path)}`);
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Cannot read file');
    tab.content = d.content; tab.savedContent = d.content;
    tab.dirty = false; tab.loaded = true;
  } catch (e) {
    tab.content = ''; tab.savedContent = ''; tab.loaded = true; tab.loadError = e.message;
  }
  if (editorTabs[activeTabIdx]?.path === tab.path) _edShowTab(idx);
}

function _edShowTab(idx) {
  const tab = editorTabs[idx];
  const ta  = document.getElementById('ed-area');
  const st  = document.getElementById('ed-status');
  const sv  = document.getElementById('ed-save');
  const nm  = document.getElementById('ed-name');
  const info= document.getElementById('ed-info');
  if (!ta || !tab) return;
  ta.placeholder = '';
  ta.value = tab.content;
  if (nm) nm.textContent = tab.path.split('/').pop();
  if (sv) sv.disabled = !tab.dirty;
  if (tab.loadError) {
    if (st) { st.textContent = 'Error: ' + tab.loadError; st.style.color = 'var(--red)'; }
  } else {
    _edUpdateStatus();
    const lines = tab.content.split('\n').length;
    if (info) info.textContent = `${lines.toLocaleString()} lines \u00b7 ${fmtSize(new Blob([tab.content]).size)}`;
  }
  ta.focus();
}

function _edUpdateStatus() {
  const tab = editorTabs[activeTabIdx];
  const st  = document.getElementById('ed-status');
  if (!st || !tab) return;
  if (tab.dirty) { st.textContent = '\u25cf Unsaved'; st.style.color = 'var(--accent2)'; }
  else           { st.textContent = 'Ready';          st.style.color = 'var(--green)'; }
}

function _edCloseTab(idx) {
  const tab = editorTabs[idx];
  if (!tab) return;
  if (tab.dirty && !confirm(`"${tab.path.split('/').pop()}" has unsaved changes. Close anyway?`)) return;
  editorTabs.splice(idx, 1);
  if (!editorTabs.length) { _editorModal = null; closeModal(); return; }
  if (activeTabIdx >= editorTabs.length) activeTabIdx = editorTabs.length - 1;
  _edRenderTabs();
  _edShowTab(activeTabIdx);
}

function _edCloseAll() {
  const dirty = editorTabs.filter(t => t.dirty).map(t => t.path.split('/').pop());
  if (dirty.length && !confirm(`Unsaved changes in: ${dirty.join(', ')}\nClose editor?`)) return;
  _editorModal = null; editorTabs = []; activeTabIdx = 0;
  closeModal();
}

async function saveEditor() {
  const tab = editorTabs[activeTabIdx];
  if (!tab || !tab.dirty) return;
  const sv = document.getElementById('ed-save');
  const st = document.getElementById('ed-status');
  if (sv) { sv.disabled = true; sv.textContent = 'Saving\u2026'; }
  if (st) { st.textContent = 'Saving\u2026'; st.style.color = 'var(--yellow)'; }
  try {
    const r = await fetch('/api/file/write', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: tab.path, content: tab.content })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Save failed');
    tab.savedContent = tab.content; tab.dirty = false;
    _edRenderTabs();
    if (sv) { sv.disabled = true; sv.textContent = 'Save'; }
    if (st) { st.textContent = `Saved ${fmtSize(d.size)}`; st.style.color = 'var(--green)'; }
    const nm = document.getElementById('ed-name');
    if (nm) nm.textContent = tab.path.split('/').pop();
    toast(`\u2713 Saved: ${tab.path.split('/').pop()}`, 'ok');
    reload();
  } catch (e) {
    if (sv) { sv.disabled = false; sv.textContent = 'Save'; }
    if (st) { st.textContent = 'Save failed'; st.style.color = 'var(--red)'; }
    toast('Save failed: ' + e.message, 'err');
  }
}

async function doZipSelected(singlePath, singleType) {
  // Collect what to zip: multi-selection or single item
  const items = selected.size > 0
    ? [...selected]
    : singlePath ? [singlePath] : [];
  if (!items.length) { toast('Nothing selected', 'warn'); return; }

  const defaultName = items.length === 1
    ? items[0].split('/').pop().replace(/\.\w+$/, '') + '.zip'
    : 'archive.zip';

  const m = mkModal();
  m.innerHTML = `<h2>🗜 Create Zip Archive</h2>
    <p style="color:var(--text3);font-size:12px;margin-bottom:8px">${items.length} item(s) selected</p>
    <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">Archive name</label>
    <input class="modal-input" id="zip-name" type="text" value="${esc(defaultName)}" autofocus>
    <label style="font-size:12px;color:var(--text3);display:block;margin:10px 0 4px">Save to folder</label>
    <input class="modal-input" id="zip-dest" type="text" value="${esc(curPath)}" placeholder="/path/to/folder">
    <div class="modal-row">
      <button class="mbtn" onclick="closeModal()">Cancel</button>
      <button class="mbtn ok" onclick="startZip(${JSON.stringify(items).replace(/"/g,'&quot;')})">🗜 Create</button>
    </div>`;
  setTimeout(() => { const i = document.getElementById('zip-name'); if(i){i.focus();i.select();} }, 80);
}

async function startZip(items) {
  const nameEl = document.getElementById('zip-name');
  const destEl = document.getElementById('zip-dest');
  if (!nameEl || !destEl) return;
  const zipName = nameEl.value.trim().replace(/[<>:"\/|?*]/g,'_') || 'archive.zip';
  const destDir = destEl.value.trim() || curPath;
  const destination = destDir.replace(/\/+$/, '') + '/' + (zipName.endsWith('.zip') ? zipName : zipName + '.zip');
  closeModal();

  try {
    const r = await fetch('/api/zip', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ sources: items, destination, clientId: wsId })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Failed');
    activeJobs.set(d.jobId, { jobId: d.jobId, status: 'running', percent: 0, phase: 'zipping', type: 'zip' });
    showProgressPanel(`Creating ${zipName}…`);
    updateJobsBadge();
    toast(`🗜 Zipping ${items.length} item(s)…`, 'ok');
  } catch(e) { toast('Zip failed: ' + e.message, 'err'); }
}

async function doUnzip(p) {
  const name    = p.split('/').pop();
  const destDir = p.substring(0, p.lastIndexOf('/')) || curPath;

  const m = mkModal();
  m.innerHTML = `<h2>📦 Extract Zip</h2>
    <p style="color:var(--text3);font-size:12px;margin-bottom:8px">File: <span style="font-family:var(--font-mono);color:var(--text2)">${esc(name)}</span></p>
    <label style="font-size:12px;color:var(--text3);display:block;margin-bottom:4px">Extract to folder</label>
    <input class="modal-input" id="unzip-dest" type="text" value="${esc(destDir)}" autofocus>
    <div class="modal-row">
      <button class="mbtn" onclick="closeModal()">Cancel</button>
      <button class="mbtn ok" onclick="startUnzip('${esc(p)}')">📦 Extract</button>
    </div>`;
  setTimeout(() => { const i = document.getElementById('unzip-dest'); if(i) i.focus(); }, 80);
}

async function startUnzip(p) {
  const destEl = document.getElementById('unzip-dest');
  const destination = destEl ? destEl.value.trim() : null;
  closeModal();
  const name = p.split('/').pop();
  try {
    const r = await fetch('/api/unzip', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ path: p, destination, clientId: wsId })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Failed');
    activeJobs.set(d.jobId, { jobId: d.jobId, status: 'running', percent: 0, phase: 'extracting', type: 'unzip' });
    showProgressPanel(`Extracting ${name}…`);
    updateJobsBadge();
    toast(`📦 Extracting ${name}…`, 'ok');
  } catch(e) { toast('Unzip failed: ' + e.message, 'err'); }
}

function loadPinned() {
  try { return JSON.parse(localStorage.getItem('nova_pinned') || '[]'); }
  catch { return []; }
}
function savePinned(pins) {
  localStorage.setItem('nova_pinned', JSON.stringify(pins));
}
function renderPinnedPlaces() {
  const pins = loadPinned();
  const sec  = document.getElementById('pinned-section');
  const div  = document.getElementById('pinned-list');
  const divider = document.getElementById('pinned-divider');
  if (!sec || !div) return;
  sec.style.display   = pins.length ? '' : 'none';
  if (divider) divider.style.display = pins.length ? '' : 'none';
  div.innerHTML = pins.map((pin, i) =>
    `<div class="sb-item" data-path="${esc(pin.path)}" onclick="nav('${esc(pin.path)}')" style="display:flex;justify-content:space-between;align-items:center;padding-right:4px">
      <span style="display:flex;align-items:center;gap:6px;overflow:hidden">
        <span class="sb-icon">📁</span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(pin.name)}</span>
      </span>
      <span onclick="event.stopPropagation();unpinPlace(${i})" title="Remove" style="color:var(--text3);font-size:14px;padding:2px 4px;border-radius:3px;cursor:pointer;flex-shrink:0;line-height:1" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'">×</span>
    </div>`
  ).join('');
  sidebarActive();
}
function pinToPlaces(p, name) {
  const pins = loadPinned();
  if (pins.find(x => x.path === p)) { toast('Already pinned', 'warn'); return; }
  pins.push({ path: p, name: name || p.split('/').pop() || p });
  savePinned(pins);
  renderPinnedPlaces();
  toast(`📌 Pinned: ${name}`, 'ok');
}
function unpinPlace(idx) {
  const pins = loadPinned();
  const name = pins[idx]?.name || '';
  pins.splice(idx, 1);
  savePinned(pins);
  renderPinnedPlaces();
  toast(`Unpinned: ${name}`, 'ok');
}

function aiLoading(title, filename) {

    <p style="color:var(--text2);font-size:13px;margin-bottom:8px">${esc(filename)}</p>
    <div style="display:flex;align-items:center;gap:10px;padding:18px 0;color:var(--text3)">
      <div class="spinner"></div>
      <span id="ai-status">Asking Ollama…</span>
    </div>`;
  return m;
}

async function aiSummarize(p, name) {
  const m = aiLoading('✦ AI Summary', name);
  try {
    const r  = await fetch('/api/ollama/summarize', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ path: p })
    });
    const d = await r.json();
    // Server says it's an image — auto-switch to describe-image
    if (!r.ok && d.isImage) { return aiDescribeImage(p, name); }
    if (!r.ok) throw new Error(d.error || 'Failed');
    const ext = name.split('.').pop().toLowerCase();
    const badge = ext === 'pdf' ? '📄 PDF' : ext === 'dir' ? '📁 Directory' : '📝 Text';
    m.innerHTML = `<h2>✦ AI Summary</h2>
      <p style="color:var(--text3);font-size:12px;margin-bottom:12px;font-family:var(--font-mono)">${esc(name)} <span style="background:var(--surface3);border-radius:4px;padding:2px 6px;font-size:10px">${badge}</span></p>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:13px;line-height:1.6;color:var(--text);margin-bottom:16px">${esc(d.summary)}</div>
      <div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button></div>`;
  } catch(e) {
    m.innerHTML = `<h2>✦ AI Summary</h2><p style="color:var(--red)">Error: ${esc(e.message)}</p>
      <div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button></div>`;
  }
}

async function applyAIRename(p, newName) {
  closeModal();
  try {
    const r = await fetch('/api/rename', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ oldPath: p, newName })
    });
    const d = await r.json();
    if (r.ok) { reload(); toast('✦ Renamed by AI: ' + newName, 'ok'); }
    else { toast('⚠ Rename failed: ' + (d.error || 'Unknown error'), 'err'); }
  } catch(e) { toast('⚠ Rename failed: ' + e.message, 'err'); }
}

// ── AI Agent (plan + execute file operations) ─────────────────
async function aiAgentPlan(dir, instruction) {
  try {
    const r = await fetch('/api/ollama/agent-plan', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ dir, prompt: instruction })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'AI planning failed');
    return d.plan || d;
  } catch(e) { throw new Error('AI planning failed: ' + e.message); }
}
async function aiAgentRun(plan) {
  try {
    const r = await fetch('/api/ollama/agent-run', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ plan })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Execution failed');
    return d;
  } catch(e) { throw new Error('AI execution failed: ' + e.message); }
}
function formatAgentOps(ops) {
  if (!ops || !ops.length) return '<p style="color:var(--text3);font-size:13px">No file operations suggested.</p>';
  return `<div style="max-height:260px;overflow-y:auto;margin-bottom:14px">
    ${ops.map(op => {
      if (op.op === 'mkdir') return `<div style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);font-size:12px;margin-bottom:4px"><span style="color:var(--green);font-family:var(--font-mono)">mkdir</span><span style="font-family:var(--font-mono);color:var(--text2);margin-left:6px">${esc(op.path||'')}</span></div>`;
      if (op.op === 'move') return `<div style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);font-size:12px;margin-bottom:4px"><span style="color:var(--accent2);font-family:var(--font-mono)">move</span><span style="font-family:var(--font-mono);color:var(--text2);margin-left:6px">${esc(op.from||'')}</span><span style="color:var(--text3);margin:0 4px">→</span><span style="font-family:var(--font-mono);color:var(--text2)">${esc(op.to||'')}</span></div>`;
      if (op.op === 'move_filter') return `<div style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);font-size:12px;margin-bottom:4px"><span style="color:var(--blue,#5b9bd5);font-family:var(--font-mono)">move_filter</span><span style="font-family:var(--font-mono);color:var(--text2);margin-left:6px">all ${esc(op.filter||'')} in ${esc(op.dir||'')}</span><span style="color:var(--text3);margin:0 4px">→</span><span style="font-family:var(--font-mono);color:var(--text2)">${esc(op.target||'')}</span></div>`;
      if (op.op === 'move_except_filter') return `<div style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);font-size:12px;margin-bottom:4px"><span style="color:var(--blue,#5b9bd5);font-family:var(--font-mono)">move_except</span><span style="font-family:var(--font-mono);color:var(--text2);margin-left:6px">all except ${esc(op.except_filter||'')} from ${esc(op.dir||'')}</span><span style="color:var(--text3);margin:0 4px">→</span><span style="font-family:var(--font-mono);color:var(--text2)">${esc(op.target||'')}</span></div>`;
      if (op.op === 'move_except') return `<div style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);font-size:12px;margin-bottom:4px"><span style="color:var(--blue,#5b9bd5);font-family:var(--font-mono)">move_except</span><span style="font-family:var(--font-mono);color:var(--text2);margin-left:6px">all except [${(op.except||[]).map(n=>esc(n)).join(', ')}] from ${esc(op.dir||'')}</span><span style="color:var(--text3);margin:0 4px">→</span><span style="font-family:var(--font-mono);color:var(--text2)">${esc(op.target||'')}</span></div>`;
      return `<div style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);font-size:12px;margin-bottom:4px"><span style="font-family:var(--font-mono);color:var(--text3)">${esc(op.op||'unknown')}</span></div>`;
    }).join('')}
  </div>`;
}

// ── Delete broken symlink ─────────────────────────────────────
async function deleteBrokenSymlink(p) {
  if (!confirm(`Delete this broken symlink?\n\n${p}\n\nThis only removes the link, not any target file.`)) return;
  try {
    const r = await fetch('/api/delete-permanent', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ paths: [p] })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Delete failed');
    closeModal();
    reload();
    toast('✓ Broken symlink removed');
  } catch(e) { toast('Error: ' + e.message, 'err'); }
}

async function fixBrokenSymlink(p, currentTarget) {
  const newTarget = prompt(`Enter new symlink target path:\n(current broken target: ${currentTarget || 'unknown'})`, currentTarget || '');
  if (!newTarget || !newTarget.trim()) return;
  try {
    const r = await fetch('/api/symlink/recreate', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ path: p, target: newTarget.trim() })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Fix failed');
    closeModal();
    reload();
    toast('✓ Symlink fixed → ' + newTarget.trim());
  } catch(e) { toast('Error: ' + e.message, 'err'); }
}

let _aiSidebarOpen = false;
let _aiMessages = [];

function toggleAISidebar() {
  const sidebar = document.getElementById('ai-sidebar');
  if (!sidebar) {
    // First open: build the sidebar (buildAISidebar sets class + overlay itself)
    _aiSidebarOpen = true;
    buildAISidebar();
    return;
  }
  _aiSidebarOpen = !_aiSidebarOpen;
  sidebar.classList.toggle('ai-sidebar-open', _aiSidebarOpen);
  const overlay = document.getElementById('ai-sidebar-overlay');
  if (overlay) overlay.style.display = _aiSidebarOpen ? 'block' : 'none';
}

function aiChatAddMsg(role, content, extra) {
  const area = document.getElementById('ai-chat-area');
  if (!area) return;
  const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const div = document.createElement('div');
  div.className = `ai-msg ${role}`;
  div.innerHTML = `<div class="ai-msg-bubble">${typeof content === 'string' ? content.replace(/</g,'&lt;').replace(/>/g,'&gt;') : content}</div><div class="ai-msg-time">${time}</div>`;
  if (extra) div.appendChild(extra);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function aiChatTyping() {
  const area = document.getElementById('ai-chat-area');
  if (!area) return null;
  const div = document.createElement('div');
  div.className = 'ai-msg assistant';
  div.id = 'ai-typing-indicator';
  div.innerHTML = `<div class="ai-msg-bubble"><div class="ai-typing"><div class="ai-typing-dot"></div><div class="ai-typing-dot"></div><div class="ai-typing-dot"></div></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function aiChatBuildOpsBlock(ops, dir) {
  if (!ops || !ops.length) return null;
  const wrap = document.createElement('div');

  // ── Step renderer helpers ────────────────────────────────────
  const esc2 = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  function opSummaryHtml(op) {
    if (op.op === 'mkdir')              return `<span class="ai-op-badge ai-op-mkdir">mkdir</span> <span class="ai-op-detail">${esc2(op.path)}</span>`;
    if (op.op === 'move')               return `<span class="ai-op-badge ai-op-move">move</span> <span class="ai-op-detail">${esc2(op.from)} → ${esc2(op.to)}</span>`;
    if (op.op === 'move_filter')        return `<span class="ai-op-badge ai-op-move">move_filter</span> <span class="ai-op-detail">all <strong>${esc2(op.filter)}</strong> from ${esc2(op.dir)} → ${esc2(op.target)}</span>`;
    if (op.op === 'move_except_filter') return `<span class="ai-op-badge ai-op-move">move_except</span> <span class="ai-op-detail">everything except <strong>${esc2(op.except_filter)}</strong> from ${esc2(op.dir)} → ${esc2(op.target)}</span>`;
    if (op.op === 'move_except')        return `<span class="ai-op-badge ai-op-move">move_except</span> <span class="ai-op-detail">all except [${(op.except||[]).map(esc2).join(', ')}] from ${esc2(op.dir)} → ${esc2(op.target)}</span>`;
    return `<span class="ai-op-badge">${esc2(op.op)}</span>`;
  }

  function fmtSz(b) {
    if (!b) return '';
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  }

  // ── STEP 1: Plan summary ─────────────────────────────────────
  function renderStep1() {
    wrap.innerHTML = `
      <div class="ai-ops-block">
        <div style="font-size:10px;color:var(--text3);margin-bottom:8px;font-weight:700;letter-spacing:.06em">STEP 1 OF 3 — PLAN</div>
        ${ops.map(op => `<div class="ai-op-row">${opSummaryHtml(op)}</div>`).join('')}
      </div>
      <div style="display:flex;gap:6px;margin-top:8px;align-items:center">
        <span style="font-size:11px;color:var(--text3);flex:1">Review the plan above, then preview exact files →</span>
        <button class="ai-run-btn" id="ai-preview-btn" style="background:var(--surface3);color:var(--text);border:1px solid var(--border)">Preview files →</button>
      </div>`;
    wrap.querySelector('#ai-preview-btn').onclick = () => runStep2();
  }

  // ── STEP 2: Dry-run preview ──────────────────────────────────
  async function runStep2() {
    wrap.innerHTML = `<div class="ai-ops-block"><div style="display:flex;align-items:center;gap:8px;color:var(--text3);padding:4px 0"><div class="spinner" style="width:12px;height:12px;border-width:2px"></div><span style="font-size:12px">Calculating affected files…</span></div></div>`;
    try {
      const r = await fetch('/api/ollama/agent-preview', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ plan: { operations: ops } })
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Preview failed');
      renderStep2(d.preview || []);
    } catch(e) {
      wrap.innerHTML = `<div class="ai-ops-block" style="color:var(--red);font-size:12px">Preview failed: ${esc2(e.message)}</div>`;
      const backBtn = document.createElement('button');
      backBtn.className = 'ai-run-btn';
      backBtn.style.cssText = 'margin-top:6px;background:var(--surface3);color:var(--text);border:1px solid var(--border)';
      backBtn.textContent = '← Back';
      backBtn.onclick = renderStep1;
      wrap.appendChild(backBtn);
    }
  }

  function renderStep2(preview) {
    let totalFiles = 0, totalBytes = 0, html = '';

    for (const p of preview) {
      if (p.op === 'mkdir') {
        html += `<div class="ai-op-row"><span class="ai-op-badge ai-op-mkdir">mkdir</span><span class="ai-op-detail">${esc2(p.path)}${p.exists ? ' <em style="color:var(--text3)">(already exists)</em>' : ''}</span></div>`;
        continue;
      }
      const files = p.files || [];
      totalFiles += files.length;
      files.forEach(f => { totalBytes += f.size || 0; });
      if (!files.length) {
        html += `<div class="ai-op-row"><span class="ai-op-badge" style="background:rgba(217,95,95,.15);color:var(--red)">empty</span><span class="ai-op-detail" style="color:var(--text3)">No files match — ${esc2(p.op)} from ${esc2(p.dir || p.from || '?')}</span></div>`;
        continue;
      }
      // Show up to 8 files, then a summary
      const show = files.slice(0, 8);
      const rest = files.length - show.length;
      html += `<div style="margin-bottom:8px">
        <div style="font-size:10px;color:var(--text3);margin-bottom:4px;font-weight:600">${esc2(p.op)} · ${files.length} file${files.length!==1?'s':''} → <span style="color:var(--accent2)">${esc2(p.target||p.to||'')}</span></div>
        ${show.map(f => `
          <div style="display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px">
            <span style="font-family:var(--font-mono);color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc2(f.name)}</span>
            <span style="color:var(--text3);flex-shrink:0">${fmtSz(f.size)}</span>
          </div>`).join('')}
        ${rest > 0 ? `<div style="font-size:11px;color:var(--text3);padding:4px 0">…and ${rest} more file${rest!==1?'s':''}</div>` : ''}
      </div>`;
    }

    wrap.innerHTML = `
      <div class="ai-ops-block">
        <div style="font-size:10px;color:var(--text3);margin-bottom:8px;font-weight:700;letter-spacing:.06em">STEP 2 OF 3 — PREVIEW</div>
        <div style="max-height:240px;overflow-y:auto;">${html || '<div style="color:var(--text3);font-size:12px">Nothing to move.</div>'}</div>
        ${totalFiles > 0 ? `<div style="font-size:11px;color:var(--text3);margin-top:8px;padding-top:6px;border-top:1px solid var(--border)">${totalFiles} file${totalFiles!==1?'s':''} · ${fmtSz(totalBytes)} total</div>` : ''}
      </div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="ai-run-btn" id="ai-back-btn" style="background:var(--surface3);color:var(--text);border:1px solid var(--border)">← Back</button>
        ${totalFiles > 0 ? `<button class="ai-run-btn" id="ai-execute-btn">▶ Execute (${totalFiles} file${totalFiles!==1?'s':''})</button>` : ''}
      </div>`;
    wrap.querySelector('#ai-back-btn').onclick = renderStep1;
    const execBtn = wrap.querySelector('#ai-execute-btn');
    if (execBtn) execBtn.onclick = () => runStep3(execBtn);
  }

  // ── STEP 3: Execute ──────────────────────────────────────────
  async function runStep3(btn) {
    btn.disabled = true;
    btn.textContent = 'Running…';
    try {
      const r = await fetch('/api/ollama/agent-run', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ plan: { operations: ops } })
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Execution failed');
      const errs = (d.results || []).filter(r => r.status !== 'ok');
      const moved = (d.results || []).reduce((s, r) => s + (r.moved || (r.status === 'ok' && r.op === 'move' ? 1 : 0)), 0);
      wrap.innerHTML = `
        <div class="ai-ops-block" style="border-color:${errs.length ? 'rgba(217,95,95,.4)' : 'rgba(82,196,26,.3)'}">
          <div style="font-size:10px;color:var(--text3);margin-bottom:6px;font-weight:700;letter-spacing:.06em">STEP 3 OF 3 — DONE</div>
          <div style="font-size:13px;font-weight:600;color:${errs.length ? 'var(--red)' : '#52c41a'}">${errs.length ? `⚠ Completed with ${errs.length} error(s)` : `✓ Done — ${moved} file${moved!==1?'s':''} moved`}</div>
          ${errs.map(e => `<div style="font-size:11px;color:var(--red);margin-top:4px">${esc2(e.op||'')} ${esc2(e.error||'')}</div>`).join('')}
        </div>`;
      reload();
    } catch(e) {
      btn.disabled = false;
      btn.textContent = '▶ Retry';
      aiChatAddMsg('error', 'Execute failed: ' + e.message);
    }
  }

  renderStep1();
  return wrap;
}

window.aiChatSend = async function() {
  const input = document.getElementById('ai-chat-input');
  const sendBtn = document.getElementById('ai-chat-send');
  if (!input || !sendBtn) return;
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  aiChatAddMsg('user', text);
  const typing = aiChatTyping();

  try {
    const dir = curPath || '/';
    const r = await fetch('/api/ollama/agent-plan', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ dir, prompt: text })
    });
    const d = await r.json();
    if (typing) typing.remove();
    if (!r.ok) throw new Error(d.error || 'AI planning failed');
    const ops = d.plan?.operations || [];
    if (!ops.length) {
      aiChatAddMsg('assistant', "I couldn't plan that operation. Tips:\n• Be specific: \"move all non-image files from here to /home/user/Downloads/noob\"\n• Navigate into the folder first, then ask\n• For cross-folder moves, include the full target path\n• I can: move, create folders, filter by type (images/files/dirs)");
    } else {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'ai-msg assistant';
      const bubble = document.createElement('div');
      bubble.className = 'ai-msg-bubble';
      bubble.innerHTML = `Here's what I'd do in <span class="ai-dir-badge">${esc(dir)}</span> — review and run when ready:`;
      const time = document.createElement('div');
      time.className = 'ai-msg-time';
      time.textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      const opsBlock = aiChatBuildOpsBlock(ops, dir);
      msgDiv.appendChild(bubble);
      if (opsBlock) msgDiv.appendChild(opsBlock);
      msgDiv.appendChild(time);
      const area = document.getElementById('ai-chat-area');
      if (area) { area.appendChild(msgDiv); area.scrollTop = area.scrollHeight; }
    }
  } catch(e) {
    if (typing) typing.remove();
    aiChatAddMsg('error', 'Error: ' + e.message);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
};

function showAITask(initialDir) {
  const dir = initialDir || curPath;
  const m = mkModal();
  m.innerHTML = `<h2>✦ AI Task</h2>
    <p style="color:var(--text3);font-size:12px;margin-bottom:8px">
      Describe what you want done <strong>inside</strong> this folder:<br>
      <span style="font-family:var(--font-mono);color:var(--accent2)">${esc(dir)}</span>
    </p>
    <textarea id="ai-task-input" class="modal-input" style="min-height:80px;resize:vertical" placeholder="e.g. Move all folders into a new folder named archive"></textarea>
    <p style="color:var(--text3);font-size:11px;margin-top:2px;margin-bottom:10px">
      Supported: create folders, move items, filtered moves. AI proposes a plan first — you confirm before it runs.
    </p>
    <div id="ai-task-plan" style="font-size:12px;color:var(--text3);margin-bottom:10px;display:none"></div>
    <div class="modal-row">
      <button class="mbtn" onclick="closeModal()">Close</button>
      <button class="mbtn" id="ai-task-plan-btn">Ask AI</button>
      <button class="mbtn ok" id="ai-task-run-btn" disabled>Run Plan</button>
    </div>`;
  setTimeout(() => { const i = document.getElementById('ai-task-input'); if (i) i.focus(); }, 60);
  let latestPlan = null;
  const planDiv = m.querySelector('#ai-task-plan');
  const planBtn = m.querySelector('#ai-task-plan-btn');
  const runBtn  = m.querySelector('#ai-task-run-btn');
  if (!planBtn || !runBtn) return;
  planBtn.addEventListener('click', async () => {
    const text = (document.getElementById('ai-task-input') || {}).value?.trim() || '';
    if (!text) return;
    latestPlan = null;
    planDiv.style.display = '';
    planDiv.innerHTML = `<div style="display:flex;align-items:center;gap:8px;color:var(--text3);padding:6px 0"><div class="spinner" style="width:14px;height:14px;border-width:2px"></div><span>Thinking about safe file operations…</span></div>`;
    runBtn.disabled = true; planBtn.disabled = true;
    try {
      const plan = await aiAgentPlan(dir, text);
      const ops  = Array.isArray(plan.operations) ? plan.operations : [];
      latestPlan = { operations: ops };
      planDiv.innerHTML = ops.length
        ? `<p style="color:var(--text2);font-size:12px;margin-bottom:6px">Planned operations:</p>${formatAgentOps(ops)}`
        : '<p style="color:var(--text3);font-size:13px">AI found no safe file operations for that request.</p>';
      runBtn.disabled = !ops.length;
    } catch (e) {
      planDiv.innerHTML = `<p style="color:var(--red);font-size:13px">Error: ${esc(e.message)}</p>`;
      runBtn.disabled = true;
    } finally { planBtn.disabled = false; }
  });
  runBtn.addEventListener('click', async () => {
    if (!latestPlan?.operations?.length) return;
    runBtn.disabled = true; planBtn.disabled = true;
    planDiv.innerHTML += `<p style="color:var(--text3);font-size:12px;margin-top:6px">Running plan…</p>`;
    try {
      const res  = await aiAgentRun(latestPlan);
      const errs = (res.results || []).filter(r => r.status !== 'ok');
      if (errs.length) planDiv.innerHTML += `<p style="color:var(--red);font-size:12px;margin-top:4px">Some operations failed: ${errs.length}</p>`;
      closeModal(); reload();
      toast('✦ AI task completed', errs.length ? 'warn' : 'ok');
    } catch (e) {
      planDiv.innerHTML += `<p style="color:var(--red);font-size:12px;margin-top:4px">Run failed: ${esc(e.message)}</p>`;
      runBtn.disabled = false; planBtn.disabled = false;
    }
  });
}

function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem('nova_settings') || '{}');
    return { ...SETTINGS_DEFAULTS, ...saved };
  } catch { return { ...SETTINGS_DEFAULTS }; }
}
function saveSettings(settings) {
  try { localStorage.setItem('nova_settings', JSON.stringify(settings)); } catch {}
}

async function aiSemanticSearch(query) {
  if (!query.trim()) return;
  const m = mkModal();
  m.innerHTML = `<h2>✦ Semantic Search</h2>
    <p style="color:var(--text3);font-size:13px;margin-bottom:8px">Searching in: <span style="font-family:var(--font-mono)">${esc(curPath)}</span></p>
    <div style="display:flex;align-items:center;gap:10px;padding:18px 0;color:var(--text3)">
      <div class="spinner"></div><span>Embedding and scoring files…</span>
    </div>`;
  try {
    const r = await fetch('/api/ollama/search', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ query, dir: curPath })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Search failed');
    if (!d.results.length) {
      m.innerHTML = `<h2>✦ Semantic Search</h2><p style="color:var(--text3)">No matching text files found in this folder.</p>
        <div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button></div>`;
      return;
    }
    const rows = d.results.map(r =>
      `<div onclick="closeModal();dblItem('${r.path}','file')" style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-radius:6px;cursor:pointer;background:var(--surface3);margin-bottom:5px;border:1px solid var(--border);transition:background 0.1s" onmouseover="this.style.background='var(--surface4)'" onmouseout="this.style.background='var(--surface3)'">
        <span style="font-family:var(--font-mono);font-size:12px;color:var(--text)">${esc(r.name)}</span>
        <span style="font-size:11px;color:var(--accent2);font-family:var(--font-mono)">${Math.round(r.score*100)}%</span>
      </div>`
    ).join('');
    m.innerHTML = `<h2>✦ Semantic Search</h2>
      <p style="color:var(--text3);font-size:12px;margin-bottom:12px">Query: <em style="color:var(--text2)">${esc(query)}</em></p>
      <div style="max-height:340px;overflow-y:auto;margin-bottom:14px">${rows}</div>
      <div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button></div>`;
  } catch(e) {
    m.innerHTML = `<h2>✦ Semantic Search</h2><p style="color:var(--red)">Error: ${esc(e.message)}</p>
      <div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button></div>`;
  }
}

// UPLOAD
// ═══════════════════════════════════════════
function showUpload() { document.getElementById('file-input').click(); }
async function uploadFiles(files) {
  if (!files || !files.length) return;
  document.getElementById('file-input').value = '';
  const total = files.length;
  showProgressPanel(`Uploading ${total} file(s)…`);

  // Upload one file at a time so we can show per-file byte-level progress.
  // Each file is a separate request; the server still tracks them via jobId.
  requestWakeLock();
  for (let i = 0; i < total; i++) {
    fd.append('files', file);
    fd.append('path', curPath);
    fd.append('clientId', wsId);

    // Prime the panel with current file name
    document.getElementById('pp-file').textContent =
      `(${i + 1}/${total}) ${file.name}`;
    updatePP(Math.round((i / total) * 100), 'uploading');

    await new Promise(resolve => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/upload');

      xhr.upload.onprogress = ev => {
        if (!ev.lengthComputable) return;
        // Overall % = files done + fraction through current file
        const overallPct = Math.round(((i + ev.loaded / ev.total) / total) * 100);
        const ppBar = document.getElementById('pp-bar');
        const ppPct = document.getElementById('pp-pct');
        if (ppBar) ppBar.style.width = overallPct + '%';
        if (ppPct) ppPct.textContent = overallPct + '%';
        document.getElementById('pp-file').textContent =
          `(${i + 1}/${total}) ${file.name}  ${fmtSize(ev.loaded)} / ${fmtSize(ev.total)}`;
      };

      xhr.onload = () => {
        try {
          const d = JSON.parse(xhr.responseText);
          if (d.jobId) {
            activeJobs.set(d.jobId, { jobId: d.jobId, status: 'running', percent: 0, phase: 'saving', type: 'upload' });
            updateJobsBadge();
          }
        } catch {}
        resolve();
      };
      xhr.onerror = () => { toast(`↑ Upload failed: ${file.name}`, 'err'); resolve(); };
      xhr.send(fd);
    });
  }

  toast(`✓ ${total} file(s) uploaded`, 'ok');
  releaseWakeLock();
  reload();
  setTimeout(() => { if (typeof closeProgress === "function") closeProgress(); }, 1800);
}

function showProgressPanel(label) {
  const pp = document.getElementById('progress-panel');
  pp.style.display = '';
  document.getElementById('pp-label').textContent = label;
  document.getElementById('pp-spin').style.display = '';
  document.getElementById('pp-bar').style.width = '0%';
  document.getElementById('pp-pct').textContent = '0%';
  document.getElementById('pp-file').textContent = 'Running on server — safe to close browser';
  document.getElementById('pp-phase').textContent = 'Starting';
  document.getElementById('pp-phase').className = 'phase-pill phase-starting';
  // Reset cancel button state for new job
  const cancelBtn = document.getElementById('pp-cancel-btn');
  if (cancelBtn) { cancelBtn.textContent = 'Cancel'; cancelBtn.disabled = false; cancelBtn.style.display = 'none'; }
}
let _activeCancelJobId = null;

function showCancelBtn(jobId) {
  _activeCancelJobId = jobId;
  const btn = document.getElementById('pp-cancel-btn');
  if (btn) btn.style.display = '';
}
function hideCancelBtn() {
  _activeCancelJobId = null;
  const btn = document.getElementById('pp-cancel-btn');
  if (btn) btn.style.display = 'none';
}
async function cancelActiveJob() {
  if (!_activeCancelJobId) return;
  try {
    await fetch('/api/transfer/cancel', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ jobId: _activeCancelJobId })
    });
    const btn = document.getElementById('pp-cancel-btn');
    if (btn) { btn.textContent = 'Cancelling…'; btn.disabled = true; }
  } catch {}
}

function updateProgressPanel(job) {
  const pp = document.getElementById('progress-panel');
  if (pp.style.display === 'none' && (job.status === 'running')) {
    pp.style.display = '';
    const opLabel = job.operation === 'move' ? 'Moving…'
                  : job.type === 'delete' || job.type === 'delete-permanent' ? 'Deleting…'
                  : job.type === 'trash-empty' ? 'Emptying trash…'
                  : job.type === 'upload' ? 'Uploading…'
                  : job.type === 'zip'    ? 'Zipping…'
                  : job.type === 'unzip'  ? 'Extracting…'
                  : 'Copying…';
    document.getElementById('pp-label').textContent = opLabel;
    document.getElementById('pp-spin').style.display = '';
  }
  // Show cancel button for running transfer jobs
  if (job.status === 'running' && job.type === 'transfer') {
    showCancelBtn(job.jobId);
  } else {
    hideCancelBtn();
  }
  document.getElementById('pp-file').textContent = job.currentFile || 'Running on server — safe to close browser';
  document.getElementById('pp-bar').style.width = (job.percent||0)+'%';
  document.getElementById('pp-pct').textContent = (job.percent||0)+'%';
  const phase = job.status === 'done'      ? 'done'
              : job.status === 'error'     ? 'error'
              : job.status === 'cancelled' ? 'cancelled'
              : (job.phase || 'starting');
  document.getElementById('pp-phase').textContent = phase.charAt(0).toUpperCase()+phase.slice(1);
  document.getElementById('pp-phase').className = `phase-pill phase-${phase}`;
  if (job.status !== 'running') document.getElementById('pp-spin').style.display = 'none';
}
function updatePP(pct, phase) {
  document.getElementById('pp-bar').style.width = pct+'%';
  document.getElementById('pp-pct').textContent = pct+'%';
  document.getElementById('pp-phase').textContent = phase;
}
function closeProgress() { document.getElementById('progress-panel').style.display = 'none'; }

// ── Mounted drives sidebar ────────────────────────────────────────
async function loadMounts() {
  try {
    const r = await fetch('/api/mounts');
    const d = await r.json();
    const mounts = (d.mounts || []).filter(m =>
      m.mountpoint && !m.mountpoint.startsWith('/proc') && !m.mountpoint.startsWith('/sys')
    );
    const section  = document.getElementById('drives-section');
    const divider  = document.getElementById('drives-divider');
    const list     = document.getElementById('drives-list');
    if (!section || !list) return;
    if (!mounts.length) { section.style.display = 'none'; if (divider) divider.style.display = 'none'; return; }
    section.style.display = '';
    if (divider) divider.style.display = '';

    list.innerHTML = mounts.map(m => {
      const label = m.label || m.mountpoint.split('/').filter(Boolean).pop() || m.device;
      // Pick icon by filesystem / path
      let iconKey = 'hdd';
      const fs = (m.fstype || '').toLowerCase();
      if (fs === 'tmpfs' || fs === 'ramfs') iconKey = 'temp';
      else if (fs.startsWith('nfs') || fs === 'cifs' || fs === 'smbfs' || fs === 'davfs') iconKey = 'network';
      else if (m.device && m.device.includes('usb')) iconKey = 'usb';
      else if (m.mountpoint.startsWith('/media') || m.mountpoint.startsWith('/run/media')) iconKey = 'media';

      // Build the same card layout as the Storage widget
      let fillStyle = '';
      let pctLabel  = '';
      let numsHtml  = '';
      let fillW     = '0%';
      if (m.total && m.total > 0) {
        const pct = Math.round((m.used / m.total) * 100);
        fillW    = pct + '%';
        fillStyle = pct > 85 ? 'background:var(--red)' : pct > 65 ? 'background:var(--yellow)' : '';
        pctLabel  = pct + '% used';
        numsHtml  = `${fmtSize(m.used)} / ${fmtSize(m.total)} · ${fmtSize(m.avail||0)} free`;
      }

      return `<div class="disk-card drive-card" onclick="nav('${esc(m.mountpoint)}')" data-path="${esc(m.mountpoint)}" title="${esc(m.mountpoint)} (${esc(m.fstype||'')})">
        <div class="disk-head">
          <span style="display:flex;align-items:center;gap:7px">
            <span style="opacity:.7;display:flex">${SB[iconKey]}</span>
            <span style="color:var(--text2);font-size:12px;font-weight:500">${esc(label)}</span>
          </span>
          <span>${pctLabel}</span>
        </div>
        <div class="disk-track"><div class="disk-fill" style="width:${fillW};${fillStyle}"></div></div>
        ${numsHtml ? `<div class="disk-nums">${numsHtml}</div>` : ''}
      </div>`;
    }).join('');

    // Keep sidebar active state in sync
    sidebarActive();
  } catch(e) {
    // Silently fail — mounts are optional
  }
}

async function loadDisk() {
  try {
    const r = await fetch('/api/diskinfo'); const d = await r.json();
    const pct = Math.round(d.used/d.total*100);
    document.getElementById('disk-fill').style.width = pct+'%';
    document.getElementById('disk-pct').textContent = pct+'% used';
    document.getElementById('disk-nums').textContent = `${fmtSize(d.used)} / ${fmtSize(d.total)} · ${fmtSize(d.avail)} free`;
  } catch {}
}

document.addEventListener('keydown', ev => {
  if (ev.target.tagName==='INPUT' || ev.target.tagName==='TEXTAREA' || ev.target.isContentEditable) return;
  if (ev.ctrlKey||ev.metaKey) {
    if (ev.key==='c') copySel();
    if (ev.key==='x') cutSel();
    if (ev.key==='v') doPaste();
    if (ev.key==='a') { ev.preventDefault(); filtered.forEach(e=>selected.add(e.path)); renderFiles(); selUI(); }
  }
  if (ev.key==='Delete'&&selected.size) delSel();
  if (ev.key==='F5') { ev.preventDefault(); reload(); }
  if (ev.key==='Escape') { selected.clear(); renderFiles(); selUI(); document.querySelectorAll('.ctxmenu').forEach(e=>e.remove()); }
  if (ev.key==='Backspace'&&!ev.target.closest('input')) { ev.preventDefault(); goBack(); }
});

async function resumeTransfer(jobId) {

  try {
    const r = await fetch('/api/transfer/resume', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jobId, clientId: wsId })
    });
    const d = await r.json();
    if (!r.ok) { toast('⚠ ' + (d.error || 'Resume failed'), 'err'); return; }
    if (d.message) { toast('✓ ' + d.message, 'ok'); return; } // already complete
    toast(`⟳ Resuming transfer (${d.remainingFiles} file(s) left)`, 'ok');
    activeJobs.set(d.jobId, { jobId: d.jobId, status: 'running', percent: 0, phase: 'resuming', type: 'transfer' });
    showProgressPanel('Resuming…');
    updateJobsBadge();
  } catch (e) { toast('⚠ Resume failed: ' + e.message, 'err'); }
}

// ═══════════════════════════════════════════
// RESTORE RUNNING JOBS ON PAGE LOAD/REOPEN
// ═══════════════════════════════════════════
async function restoreRunningJobs() {
  try {
    const r = await fetch('/api/jobs');
    const d = await r.json();
    // Show ALL running jobs — wsId is now in localStorage so it persists
    // across browser restarts; jobs started before the browser closed will
    // still match. But even if the wsId changed we still show them all.
    const running = (d.jobs || []).filter(j => j.status === 'running');
    if (!running.length) return;
    for (const job of running) {
      activeJobs.set(job.jobId, job);
    }
    const latest = running.sort((a,b) => new Date(b.startedAt)-new Date(a.startedAt))[0];
    updateProgressPanel(latest);
    // Re-attach cancel button if the job supports it
    if (latest.type === 'transfer') showCancelBtn(latest.jobId);
    updateJobsBadge();
    toast(`⟳ Reconnected to ${running.length} running job(s)`, 'ok');
  } catch {}
}

// Honour ?path= from PWA shortcuts or shared URLs
const _startPath = new URLSearchParams(location.search).get('path') || '/';

renderPinnedPlaces();
loadDisk();
loadMounts();
loadTrash();
setInterval(loadDisk, 30000);
setInterval(loadMounts, 60000);
setInterval(loadTrash, 8000);

// Poll running jobs so progress panel updates even if WS reconnects or browser was reopened
setInterval(async () => {
  const hasActive = [...activeJobs.values()].some(j=>j.status==='running');
  if (!hasActive) return;
  try {
    const r = await fetch('/api/jobs');
    const d = await r.json();
    for (const job of d.jobs) {
      if (job.status==='running' || activeJobs.has(job.jobId)) {
        activeJobs.set(job.jobId, job);
        updateProgressPanel(job);
        // Handle completion detected via poll (in case WS missed it)
        const terminal = job.status === 'done' || job.status === 'error' || job.status === 'cancelled';
        if (terminal && !finishedJobs.has(job.jobId)) {
          finishedJobs.add(job.jobId);
          hideCancelBtn();
          if (job.status === 'done') {
            setTimeout(() => closeProgress(), 2500);
            const label = job.type === 'delete' || job.type === 'delete-permanent' ? '🗑 Delete complete'
                        : job.type === 'trash-empty' ? '🗑 Trash emptied'
                        : job.type === 'upload'  ? '✓ Upload saved'
                        : job.type === 'zip'     ? '🗜 Zip complete'
                        : job.type === 'unzip'   ? '📦 Extracted'
                        : `✓ ${job.operation === 'move' ? 'Move' : 'Copy'} complete`;
            toast(label, 'ok');
            reload(); loadTrash();
          } else if (job.status === 'cancelled') {
            const cancelMsg2 = job.type === 'zip'   ? '⏹ Zip cancelled — open Jobs to resume'
                             : job.type === 'unzip' ? '⏹ Extract cancelled — open Jobs to resume'
                             : '⏹ Transfer cancelled — open Jobs to resume';
            toast(cancelMsg2, 'warn');
            reload();
          } else {
            toast('⚠ ' + (job.error || 'Operation failed'), 'err');
          }
        }
      }
    }
    updateJobsBadge();
  } catch {}
}, 2000);
</script>
