<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova — File Manager</title>

<!-- Favicon & Icons -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/x-icon" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="120x120" href="/icon-120.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">

<!-- PWA / Web App Manifest -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#c4663a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nova">
<script>
  // Service Worker registration
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .catch(err => console.warn('SW registration failed:', err));
    });
  }
  // PWA install prompt
  let _deferredInstall = null;
  window.addEventListener('beforeinstallprompt', ev => {
    ev.preventDefault();
    _deferredInstall = ev;
    const btn = document.getElementById('btn-install');
    if (btn) btn.style.display = '';
  });
  window.addEventListener('appinstalled', () => {
    _deferredInstall = null;
    const btn = document.getElementById('btn-install');
    if (btn) btn.style.display = 'none';
  });
  function triggerInstall() {
    if (!_deferredInstall) return;
    _deferredInstall.prompt();
    _deferredInstall.userChoice.then(() => { _deferredInstall = null; });
  }
</script>

<!-- SEO / Social -->
<meta name="description" content="Nova — a fast, modern self-hosted file manager">
<meta name="robots" content="noindex, nofollow">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #1a1916;
  --surface:   #211f1c;
  --surface2:  #2a2825;
  --surface3:  #332f2b;
  --surface4:  #3d3835;
  --border:    rgba(255,240,220,0.07);
  --border2:   rgba(255,240,220,0.12);
  --text:      #f0e8dc;
  --text2:     #a89880;
  --text3:     #6a5e50;
  --accent:    #c4663a;
  --accent2:   #e07848;
  --accent3:   #f09060;
  --accentbg:  rgba(196,102,58,0.12);
  --accentbg2: rgba(196,102,58,0.20);
  --green:     #5aaa78;
  --red:       #d95f5f;
  --yellow:    #c9944a;
  --blue:      #5a8fcc;
  --radius:    10px;
  --rsm:       6px;
  --tr:        0.14s ease;
  --font-serif: 'Lora', ui-serif, Georgia, Cambria, serif;
  --font-sans:  'IBM Plex Sans', system-ui, sans-serif;
  --font-mono:  'IBM Plex Mono', 'Fira Code', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-size: 15px;
}

/* ── TITLEBAR ─────────────────────────────────────── */
.titlebar {
  display: flex; align-items: center; gap: 14px;
  padding: 0 20px; height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo {
  display: flex; align-items: center; gap: 9px;
  font-family: var(--font-serif);
  font-weight: 600; font-size: 17px;
  letter-spacing: -0.2px;
  color: var(--text);
}
.logo-mark {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; line-height: 1;
  box-shadow: 0 2px 8px rgba(196,102,58,0.35);
}
.breadcrumb {
  display: flex; align-items: center; gap: 3px;
  flex: 1; min-width: 0;
  font-size: 12.5px; color: var(--text3);
  font-family: var(--font-mono);
  overflow: hidden;
}
.bc-item {
  cursor: pointer; padding: 4px 7px;
  border-radius: 5px;
  white-space: nowrap; transition: var(--tr);
  max-width: 180px; overflow: hidden; text-overflow: ellipsis;
}
.bc-item:hover { background: var(--surface3); color: var(--text2); }
.bc-item.active { color: var(--text2); }
.bc-sep { color: var(--text3); font-size: 11px; opacity: 0.5; }
.tbar-actions { display: flex; align-items: center; gap: 6px; }
.tbar-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 13px; border-radius: var(--rsm);
  border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text2);
  cursor: pointer; font-size: 12.5px;
  font-family: var(--font-sans); font-weight: 500;
  transition: var(--tr); white-space: nowrap;
}
.tbar-btn:hover { background: var(--surface3); color: var(--text); }
.tbar-btn.primary {
  background: var(--accent); color: #fff;
  border-color: transparent;
  box-shadow: 0 1px 6px rgba(196,102,58,0.3);
}
.tbar-btn.primary:hover { background: var(--accent2); }

/* ── LAYOUT ───────────────────────────────────────── */
.main { display: flex; flex: 1; min-height: 0; }

/* ── SIDEBAR ──────────────────────────────────────── */
.sidebar {
  width: 210px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sb-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden; min-height: 0;
  scrollbar-width: thin; scrollbar-color: var(--surface4) transparent;
}
.sb-scroll::-webkit-scrollbar { width: 4px; }
.sb-scroll::-webkit-scrollbar-track { background: transparent; }
.sb-scroll::-webkit-scrollbar-thumb { background: var(--surface4); border-radius: 2px; }
.sb-scroll::-webkit-scrollbar-thumb:hover { background: var(--border2); }
.sb-footer {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  padding: 6px 8px;
}
.sb-section { padding: 14px 8px 4px; }
.sb-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text3); padding: 0 8px 7px;
  font-family: var(--font-sans);
}
.sb-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 10px; border-radius: var(--rsm);
  cursor: pointer; color: var(--text2);
  font-size: 14px; transition: var(--tr);
  margin-bottom: 1px;
}
.sb-item:hover { background: var(--surface2); color: var(--text); }
.sb-item.active {
  background: var(--accentbg);
  color: var(--accent3);
}
.sb-icon { width: 20px; text-align: center; font-size: 16px; flex-shrink: 0; }
.sb-badge {
  margin-left: auto; font-size: 10px;
  background: var(--surface4); color: var(--text3);
  padding: 1px 6px; border-radius: 10px; font-weight: 600;
}
.sb-divider { height: 1px; background: var(--border); margin: 6px 12px; }

.disk-card {
  margin: 8px; padding: 13px;
  background: var(--surface2); border-radius: var(--radius);
  border: 1px solid var(--border);
}
.disk-head {
  font-size: 11px; color: var(--text3);
  margin-bottom: 9px; display: flex; justify-content: space-between;
  font-family: var(--font-sans);
}
.disk-track { height: 4px; background: var(--surface4); border-radius: 2px; overflow: hidden; margin-bottom: 7px; }
.disk-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  transition: width 0.6s ease;
}
.disk-nums { font-size: 10.5px; color: var(--text3); font-family: var(--font-mono); }

/* ── SYMLINKS ─────────────────────────────────────── */
.sym-badge {
  position: absolute; top: 4px; right: 4px;
  font-size: 11px; line-height: 1;
  background: var(--accentbg); color: var(--accent3);
  border-radius: 4px; padding: 1px 4px;
  pointer-events: none;
}
.sym-badge.sym-broken { background: rgba(217,95,95,.15); color: var(--red); }
.sym-badge-inline {
  font-size: 10px; color: var(--accent3);
  margin-left: 5px; opacity: 0.8;
  font-family: var(--font-mono);
}
.sym-badge-inline.sym-broken { color: var(--red); }
.fitem-grid { position: relative; }
.sym-broken-item { opacity: 0.6; }
.sym-broken-item .grid-name,
.sym-broken-item .list-name { color: var(--red); }
.settings-group { margin-bottom: 20px; }
.settings-group-title {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text3);
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
  margin-bottom: 10px; font-family: var(--font-sans);
}
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; gap: 12px;
}
.settings-row + .settings-row { border-top: 1px solid var(--border); }
.settings-left { flex: 1; min-width: 0; }
.settings-label { font-size: 13px; color: var(--text); line-height: 1.3; }
.settings-desc  { font-size: 11px; color: var(--text3); margin-top: 2px; }
/* Toggle switch */
.sw { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.sw input { opacity: 0; width: 0; height: 0; position: absolute; }
.sw-track {
  position: absolute; inset: 0; border-radius: 10px;
  background: var(--surface4); cursor: pointer; transition: background .2s;
}
.sw input:checked + .sw-track { background: var(--accent); }
.sw-track::after {
  content:''; position: absolute; left: 3px; top: 3px;
  width: 14px; height: 14px; border-radius: 50%; background: #fff;
  transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3);
}
.sw input:checked + .sw-track::after { transform: translateX(16px); }
/* Select + input */
.settings-select {
  background: var(--surface3); border: 1px solid var(--border2);
  color: var(--text); border-radius: var(--rsm); font-size: 12px;
  padding: 5px 8px; font-family: var(--font-sans); cursor: pointer;
}
.settings-select:focus { outline: 1px solid var(--accent); }
.settings-text-input {
  background: var(--surface3); border: 1px solid var(--border2);
  color: var(--text); border-radius: var(--rsm); font-size: 12px;
  padding: 5px 10px; font-family: var(--font-mono); width: 100%;
}
.settings-text-input:focus { outline: 1px solid var(--accent); }
/* Chip pills */
.chip-group { display: flex; gap: 5px; flex-wrap: wrap; }
.chip {
  padding: 3px 11px; border-radius: 20px; font-size: 11.5px; cursor: pointer;
  border: 1px solid var(--border2); background: var(--surface3);
  color: var(--text2); transition: var(--tr); font-family: var(--font-sans);
}
.chip.on { background: var(--accentbg); border-color: var(--accent); color: var(--accent3); font-weight: 500; }
.settings-version { font-size: 11px; color: var(--text3); font-family: var(--font-mono); text-align: center; padding-top: 4px; }

/* ── CONTENT ──────────────────────────────────────── */
.content { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }

/* ── TOOLBAR ──────────────────────────────────────── */
.toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 9px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.tb-btn {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
  border-radius: var(--rsm); border: 1px solid transparent;
  background: transparent; color: var(--text3);
  cursor: pointer; font-size: 15px; transition: var(--tr);
}
.tb-btn:hover { background: var(--surface2); color: var(--text2); border-color: var(--border); }
.tb-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.tb-sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }
.tb-btn-txt {
  display: flex; align-items: center; gap: 5px;
  padding: 0 10px; height: 32px;
  border-radius: var(--rsm); border: 1px solid transparent;
  background: transparent; color: var(--text2);
  cursor: pointer; font-size: 12.5px;
  font-family: var(--font-sans); font-weight: 500; transition: var(--tr);
}
.tb-btn-txt:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
.tb-btn-txt.danger { color: var(--red); }
.tb-btn-txt.danger:hover { background: rgba(217,95,95,0.1); border-color: rgba(217,95,95,0.2); }

.search {
  flex: 1; max-width: 260px; margin-left: auto;
  display: flex; align-items: center; gap: 7px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--rsm); padding: 0 10px; height: 32px;
}
.search input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 12.5px; font-family: var(--font-sans);
}
.search input::placeholder { color: var(--text3); }
.search-icon { color: var(--text3); font-size: 13px; }

.view-toggle { display: flex; gap: 2px; }
.vbtn {
  width: 30px; height: 30px; border-radius: 5px; border: none;
  background: transparent; color: var(--text3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: var(--tr);
}
.vbtn.on { background: var(--surface2); color: var(--text2); }
.ai-btn {
  color: var(--accent2) !important;
  font-size: 14px !important;
  border: 1px solid var(--accentbg2) !important;
  background: var(--accentbg) !important;
  transition: all 0.15s;
}
.ai-btn:hover { background: var(--accentbg2) !important; box-shadow: 0 0 8px var(--accentbg2); }
#pinned-list .sb-item { position: relative; }
.ctx-item .ctx-ico { min-width: 18px; }

/* ── FILE AREA ────────────────────────────────────── */
.file-area {
  flex: 1; overflow-y: auto; padding: 14px 16px;
  position: relative;
}
.file-area::-webkit-scrollbar { width: 5px; }
.file-area::-webkit-scrollbar-thumb { background: var(--surface4); border-radius: 3px; }

/* GRID */
.file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(116px, 1fr)); gap: 7px; }
.fitem-grid {
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 8px 10px; border-radius: var(--radius);
  border: 1px solid transparent; cursor: pointer;
  transition: var(--tr); position: relative; text-align: center;
  user-select: none;
}
.fitem-grid:hover { background: var(--surface2); border-color: var(--border); }
.fitem-grid.sel { background: var(--accentbg); border-color: rgba(196,102,58,0.3); }
.fitem-grid.cut { opacity: 0.4; }
.grid-icon { font-size: 42px; margin-bottom: 8px; line-height: 1; }
.grid-name {
  font-size: 12.5px; color: var(--text); font-weight: 400;
  word-break: break-word; line-height: 1.35;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
  font-family: var(--font-sans);
}
.grid-size { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: var(--font-mono); }

/* LIST */
.list-head {
  display: grid; grid-template-columns: 22px 22px 1fr 90px 140px 80px;
  gap: 0 12px; padding: 5px 12px;
  font-size: 10.5px; color: var(--text3);
  font-weight: 500; letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border); margin-bottom: 3px;
  font-family: var(--font-sans);
}
.file-list { display: flex; flex-direction: column; gap: 1px; }
.fitem-list {
  display: grid; grid-template-columns: 22px 22px 1fr 90px 140px 80px;
  gap: 0 12px; align-items: center;
  padding: 8px 12px; border-radius: var(--rsm);
  border: 1px solid transparent; cursor: pointer;
  transition: var(--tr); user-select: none;
}
.fitem-list:hover { background: var(--surface2); border-color: var(--border); }
.fitem-list.sel { background: var(--accentbg); border-color: rgba(196,102,58,0.3); }
.fitem-list.cut { opacity: 0.4; }
.list-icon { font-size: 18px; }
.list-name {
  font-size: 14px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-family: var(--font-sans);
}
.list-size { font-size: 12.5px; color: var(--text2); font-family: var(--font-mono); }
.list-date { font-size: 12px; color: var(--text2); font-family: var(--font-mono); white-space: nowrap; }
.list-perm { font-size: 11.5px; color: var(--text3); font-family: var(--font-mono); }

.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 55%;
  color: var(--text3); gap: 10px;
}
.empty-icon { font-size: 44px; opacity: 0.3; }
.empty-txt { font-family: var(--font-serif); font-style: italic; font-size: 15px; }

/* ── STATUS BAR ───────────────────────────────────── */
.statusbar {
  display: flex; align-items: center; gap: 14px;
  padding: 0 18px; height: 28px;
  background: var(--surface); border-top: 1px solid var(--border);
  font-size: 11.5px; color: var(--text3); flex-shrink: 0;
  font-family: var(--font-mono);
}
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.status-divider { color: var(--surface4); }

/* ── CONTEXT MENU ─────────────────────────────────── */
.ctxmenu {
  position: fixed;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 5px; min-width: 186px; z-index: 9999;
  box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,240,220,0.03);
  animation: ctx-pop 0.1s ease;
  backdrop-filter: blur(16px);
}
@keyframes ctx-pop { from { opacity:0; transform:scale(0.95) translateY(-3px); } to { opacity:1; transform:none; } }
.ctx-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: 6px;
  cursor: pointer; font-size: 13px; color: var(--text2);
  transition: var(--tr); font-family: var(--font-sans);
}
.ctx-item:hover { background: var(--surface3); color: var(--text); }
.ctx-item.red { color: var(--red); }
.ctx-item.red:hover { background: rgba(217,95,95,0.1); }
.ctx-ico { width: 17px; text-align: center; font-size: 13px; }
.ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }

/* ── MODALS ───────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(10,9,8,0.7);
  backdrop-filter: blur(5px);
  z-index: 1000; display: flex;
  align-items: center; justify-content: center;
  animation: fade 0.15s ease;
}
@keyframes fade { from { opacity:0; } to { opacity:1; } }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px; padding: 26px;
  min-width: 360px; max-width: 500px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  animation: modal-drop 0.18s ease;
}
@keyframes modal-drop { from { opacity:0; transform:translateY(12px) scale(0.96); } to { opacity:1; transform:none; } }
.modal h2 {
  font-family: var(--font-serif); font-weight: 600;
  font-size: 18px; margin-bottom: 7px; letter-spacing: -0.3px;
  color: var(--text);
}
.modal p { color: var(--text2); font-size: 13.5px; margin-bottom: 20px; line-height: 1.55; }
.modal-input {
  width: 100%;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--rsm); padding: 10px 12px;
  color: var(--text); font-size: 13.5px; font-family: var(--font-sans);
  outline: none; margin-bottom: 16px; transition: var(--tr);
}
.modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accentbg); }
.modal-row { display: flex; gap: 8px; justify-content: flex-end; }
.mbtn {
  padding: 9px 18px; border-radius: var(--rsm);
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text2); cursor: pointer;
  font-size: 13px; font-family: var(--font-sans); font-weight: 500;
  transition: var(--tr);
}
.mbtn:hover { background: var(--surface3); color: var(--text); }
.mbtn.ok { background: var(--accent); color: #fff; border-color: transparent; box-shadow: 0 1px 5px rgba(196,102,58,0.3); }
.mbtn.ok:hover { background: var(--accent2); }
.mbtn.bad { background: var(--red); color: #fff; border-color: transparent; }
.mbtn.bad:hover { background: #e86a6a; }

/* ── PROGRESS PANEL ───────────────────────────────── */
.progress-panel {
  position: fixed; bottom: 44px; right: 20px;
  width: 330px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 15px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.55);
  z-index: 500; animation: slideup 0.2s ease;
}
@keyframes slideup { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
.pp-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
.pp-title {
  font-family: var(--font-serif); font-weight: 600;
  font-size: 13.5px; display: flex; align-items: center; gap: 8px;
}
.pp-close { cursor: pointer; color: var(--text3); font-size: 18px; transition: var(--tr); line-height: 1; }
.pp-close:hover { color: var(--text); }
.pp-file { font-size: 11px; color: var(--text2); margin-bottom: 8px; font-family: var(--font-mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pp-track { height: 5px; background: var(--surface4); border-radius: 3px; overflow: hidden; margin-bottom: 7px; }
.pp-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  transition: width 0.25s ease; position: relative; overflow: hidden;
}
.pp-fill::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer { from { transform:translateX(-100%); } to { transform:translateX(100%); } }
.pp-stats { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--text3); font-family: var(--font-mono); }
.phase-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 10px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; font-family: var(--font-sans);
}
.phase-copying  { background: rgba(90,143,204,0.15); color: var(--blue); }
.phase-cleaning { background: rgba(201,148,74,0.15); color: var(--yellow); }
.phase-done     { background: rgba(90,170,120,0.15); color: var(--green); }
.phase-error     { background: rgba(217,95,95,0.15);  color: var(--red); }
.phase-cancelled { background: rgba(201,148,74,0.15);  color: var(--yellow); }
.phase-starting  { background: rgba(255,240,220,0.08); color: var(--text3); }

/* ── JOBS HISTORY ─────────────────────────────────── */
.jobs-badge {
  position: fixed; bottom: 44px; right: 368px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 8px 14px;
  font-size: 12px; color: var(--text2); cursor: pointer;
  display: flex; align-items: center; gap: 7px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  transition: var(--tr); z-index: 400;
  font-family: var(--font-sans);
}
.jobs-badge:hover { background: var(--surface3); color: var(--text); }
.jobs-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

/* ── DRAG OVER ────────────────────────────────────── */
.file-area.dragover {
  background: rgba(196,102,58,0.04);
  outline: 2px dashed rgba(196,102,58,0.35);
  outline-offset: -8px;
  border-radius: var(--radius);
}

/* ── TOAST ────────────────────────────────────────── */
.toast-wrap { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); z-index: 9000; display: flex; flex-direction: column; gap: 5px; align-items: center; pointer-events: none; }
.toast {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 9px 16px;
  font-size: 13px; color: var(--text);
  box-shadow: 0 6px 24px rgba(0,0,0,0.45);
  animation: toast-in 0.18s ease;
  display: flex; align-items: center; gap: 7px;
  font-family: var(--font-sans);
  white-space: nowrap;
}
@keyframes toast-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.toast.ok  { border-color: rgba(90,170,120,0.3); }
.toast.err { border-color: rgba(217,95,95,0.3); }

/* ── SPINNER ──────────────────────────────────────── */
.spinner { width: 14px; height: 14px; border: 2px solid var(--surface4); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.55s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── CHECKBOXES ───────────────────────────────────── */
.item-cb {
  position: absolute; top: 6px; left: 6px;
  width: 18px; height: 18px;
  border-radius: 5px; border: 1.5px solid var(--border2);
  background: var(--surface3);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; cursor: pointer;
  opacity: 0; transition: opacity 0.12s ease, background 0.12s ease;
  z-index: 2; color: #fff; flex-shrink: 0;
}
.fitem-grid:hover .item-cb,
.fitem-grid.sel .item-cb { opacity: 1; }
.fitem-grid.sel .item-cb { background: var(--accent); border-color: var(--accent); }

.item-cb-list {
  width: 18px; height: 18px;
  border-radius: 5px; border: 1.5px solid var(--border2);
  background: var(--surface3);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; cursor: pointer; flex-shrink: 0;
  opacity: 0; transition: opacity 0.12s ease, background 0.12s ease;
  color: #fff;
}
.fitem-list:hover .item-cb-list,
.fitem-list.sel .item-cb-list { opacity: 1; }
.fitem-list.sel .item-cb-list { background: var(--accent); border-color: var(--accent); }

/* ── THUMBNAILS ───────────────────────────────────── */
.grid-thumb {
  width: 72px; height: 72px; margin-bottom: 8px;
  border-radius: 6px; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface3);
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.grid-thumb img {
  width: 100%; height: 100%; object-fit: cover;
  border-radius: 5px; display: block;
}
.grid-thumb-fail { font-size: 42px; line-height: 1; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: var(--surface4); border-radius: 3px; }
/* ── FILE EDITOR ─────────────────────────────────── */
.editor-wrap {
  display: flex;
  flex-direction: column;
  height: 100%;
}
.editor-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.editor-filename {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text2);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.editor-dirty { color: var(--accent2); }
.editor-dirty::after { content: ' ●'; font-size: 10px; }
.editor-status {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--font-mono);
  white-space: nowrap;
}
.editor-textarea {
  flex: 1;
  width: 100%;
  background: var(--surface);
  color: var(--text);
  border: none;
  outline: none;
  resize: none;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.65;
  padding: 18px 20px;
  tab-size: 2;
  caret-color: var(--accent2);
  overflow-y: auto;
}
.editor-textarea::selection { background: var(--accentbg2); }
.editor-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  gap: 8px;
}
/* override modal sizing for editor */
.modal.editor-modal {
  width: min(92vw, 900px);
  height: min(88vh, 720px);
  display: flex;
  flex-direction: column;
  padding: 0;
  overflow: hidden;
}
.modal.editor-modal h2 { display: none; }

/* ── RESPONSIVE / TOUCH OPTIMIZATIONS ───────────────── */
@media (max-width: 1024px) {
  body { font-size: 14px; }
  .sidebar { width: 190px; }
  .search { max-width: 210px; }
  .list-head, .fitem-list { grid-template-columns: 22px 22px 1fr 80px 110px; }
  .list-head span:nth-child(6), .fitem-list .list-perm { display: none; }
}
@media (max-width: 768px) {
  .titlebar { flex-wrap: wrap; align-items: flex-start; height: auto; padding: 8px 12px; gap: 8px 10px; }
  .logo { font-size: 16px; }
  .breadcrumb { order: 3; width: 100%; margin-top: 2px; }
  .tbar-actions { margin-left: auto; flex-wrap: wrap; gap: 6px; }
  .main { flex-direction: column; }
  .sidebar { width: 100%; flex-direction: row; border-right: none; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .sb-section { padding: 10px 8px; }
  .disk-card { display: none; }
  .toolbar { flex-wrap: wrap; row-gap: 6px; padding: 8px 10px; }
  .search { order: 99; flex: 1 1 100%; max-width: none; }
  .view-toggle { margin-left: auto; }
  .file-area { padding: 10px 10px 14px; }
  .file-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  .modal { width: min(96vw, 500px); max-width: 96vw; }
  .modal.editor-modal { width: 100vw; height: 100vh; border-radius: 0; }
}
@media (pointer: coarse) {
  .tbar-btn, .tb-btn, .tb-btn-txt, .vbtn, .sb-item, .ctx-item, .mbtn { min-height: 36px; }
  .tb-btn, .tb-btn-txt, .tbar-btn { padding-top: 9px; padding-bottom: 9px; }
}
</style>
</head>
<body>

<div class="titlebar">
  <div class="logo"><div class="logo-mark">⬡</div>Nova</div>
  <div class="breadcrumb" id="breadcrumb"></div>

      <button class="tbar-btn" onclick="showNewFile()" title="New text file" style="border-color:var(--border2)">+ New File</button>

</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-scroll">
      <div class="sb-section">
        <div class="sb-label">Places</div>
        <div class="sb-item active" onclick="nav('/')" data-path="/"><span class="sb-icon">⌂</span>Root</div>
        <div class="sb-item" onclick="nav('/home')" data-path="/home"><span class="sb-icon">⌂</span>Home</div>
        <div class="sb-item" onclick="nav('/etc')" data-path="/etc"><span class="sb-icon">⚙</span>Config</div>
        <div class="sb-item" onclick="nav('/var')" data-path="/var"><span class="sb-icon">📊</span>Var</div>
        <div class="sb-item" onclick="nav('/tmp')" data-path="/tmp"><span class="sb-icon">⚡</span>Temp</div>
        <div class="sb-item" onclick="nav('/mnt')" data-path="/mnt"><span class="sb-icon">💾</span>Mounts</div>
        <div class="sb-item" onclick="nav('/media')" data-path="/media"><span class="sb-icon">📀</span>Media</div>
      </div>
      <div class="sb-divider"></div>
      <div class="sb-section" id="pinned-section" style="display:none">
        <div class="sb-label" style="display:flex;justify-content:space-between;align-items:center">
          <span>Pinned</span>
        </div>
        <div id="pinned-list"></div>
      </div>
      <div class="sb-divider" id="pinned-divider" style="display:none"></div>
      <div class="sb-section">
        <div class="sb-label">System</div>
        <div class="sb-item" onclick="showTrash()"><span class="sb-icon">🗑</span>Trash<span class="sb-badge" id="trash-badge" style="display:none">0</span></div>
        <div class="sb-item" onclick="showJobs()"><span class="sb-icon">⚙</span>Jobs<span class="sb-badge" id="jobs-badge" style="display:none">0</span></div>
      </div>
      <div class="sb-divider"></div>
      <div class="sb-section">
        <div class="disk-card">
          <div class="disk-head"><span>Storage</span><span id="disk-pct">—</span></div>
          <div class="disk-track"><div class="disk-fill" id="disk-fill" style="width:0%"></div></div>
          <div class="disk-nums" id="disk-nums">—</div>
        </div>
      </div>
    </div>
    <div class="sb-footer">
      <div class="sb-item" onclick="showSettings()" style="margin:0">
        <span class="sb-icon">⚙</span>Settings
      </div>
    </div>
  </div>

  <div class="content">
    <div class="toolbar">
      <button class="tb-btn" id="btn-back" onclick="goBack()" disabled title="Back">←</button>
      <button class="tb-btn" id="btn-fwd" onclick="goFwd()" disabled title="Forward">→</button>
      <button class="tb-btn" onclick="reload()" title="Refresh">↺</button>
      <button class="tb-btn" id="btn-selall" onclick="toggleSelectAll()" title="Select All">☑</button>
      <div class="tb-sep"></div>
      <button class="tb-btn-txt" id="btn-cut"    style="display:none" onclick="cutSel()">✂ Cut</button>
      <button class="tb-btn-txt" id="btn-copy"   style="display:none" onclick="copySel()">⎘ Copy</button>
      <button class="tb-btn-txt" id="btn-paste"  style="display:none" onclick="doPaste()">⊞ Paste</button>
      <button class="tb-btn-txt danger" id="btn-del" style="display:none" onclick="delSel()">🗑 Delete</button>
      <div class="search">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" placeholder="Search files… (Enter for AI search)" oninput="filterFiles()" onkeydown="if(event.key==='Enter'&&this.value.startsWith('?'))aiSemanticSearch(this.value.slice(1).trim())">
      </div>
      <button class="vbtn ai-btn" id="btn-ai-search" title="AI: click for search, right-click for models" onclick="showAISearch()" oncontextmenu="event.preventDefault();showAIModels()">✦</button>
      <button id="btn-install" onclick="triggerInstall()" title="Install Nova as app" style="display:none;background:var(--accentbg);border:1px solid var(--accent);color:var(--accent2);font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:var(--font-sans);font-weight:500;white-space:nowrap">⊕ Install</button>
      <div class="view-toggle">
        <button class="vbtn on" id="vgrid" onclick="setView('grid')" title="Grid">⊞</button>
        <button class="vbtn" id="vlist" onclick="setView('list')" title="List">☰</button>
      </div>

    <div class="file-area" id="file-area"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event)"
      oncontextmenu="bgCtxMenu(event)">
    </div>

    <div class="statusbar">
      <div class="status-dot" id="sdot"></div>
      <span id="stext">Ready</span>
      <span class="status-divider">│</span>
      <span id="ssel"></span>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>
<div id="modal-root"></div>
<div id="progress-panel" style="display:none" class="progress-panel">
  <div class="pp-head">
    <div class="pp-title">
      <div class="spinner" id="pp-spin"></div>
      <span id="pp-label">Transfer</span>
      <span class="phase-pill phase-starting" id="pp-phase">Starting</span>
    </div>
    <button id="pp-cancel-btn" onclick="cancelActiveJob()" style="background:none;border:1px solid var(--border2);color:var(--text3);font-size:11px;font-family:var(--font-sans);padding:3px 10px;border-radius:5px;cursor:pointer;margin-right:6px;display:none">Cancel</button>
    <span class="pp-close" onclick="closeProgress()">×</span>
  </div>
  <div class="pp-file" id="pp-file">—</div>
  <div class="pp-track"><div class="pp-fill" id="pp-bar" style="width:0%"></div></div>
  <div class="pp-stats">
    <span id="pp-pct">0%</span>
    <span id="pp-detail"></span>
  </div>
</div>
<input type="file" id="file-input" multiple style="display:none" onchange="uploadFiles(this.files)">

<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const IMAGE_EXTS_UI = new Set(['jpg','jpeg','png','gif','webp','bmp','tiff','tif','svg','heic','heif','avif']);
const EDITABLE_EXTS_UI = new Set([
    'txt','md','markdown','log','json','yaml','yml','toml','xml','html','css',
    'js','ts','jsx','tsx','py','rb','go','rs','sh','bash','zsh','env',
    'conf','cfg','ini','properties','gitignore','dockerfile','makefile',
    'vue','svelte','graphql','proto','csv','tsv','sql','php','java','c',
    'cpp','h','hpp','cs','swift','kt','r','lua','pl','fish','bat','ps1'
  ]);

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let curPath = '/';
let hist = ['/'], histIdx = 0;
let entries = [], filtered = [];
let selected = new Set();
let viewMode = (()=>{ try { return localStorage.getItem('nova_viewMode') || 'grid'; } catch { return 'grid'; } })();
let clipboard = null;
let ws = null;
let trashItems = [];
let activeJobs = new Map();

// ═══════════════════════════════════════════
// WS
// ═══════════════════════════════════════════
// wsId persists in localStorage so jobs can be re-attached even after
// closing and fully reopening the browser (sessionStorage is cleared on close).
let wsId = localStorage.getItem('nova_wsId');
if (!wsId) {
  wsId = 'c-' + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
  localStorage.setItem('nova_wsId', wsId);
}

function initWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => ws.send(JSON.stringify({ type: 'register', clientId: wsId }));
  ws.onmessage = ev => { try { handleWS(JSON.parse(ev.data)); } catch {} };
  ws.onclose = () => setTimeout(initWS, 2500);
}

const finishedJobs = new Set(); // track notified jobs to prevent double-fire

function handleWS(msg) {
  if (msg.type === 'job_update') {
    const job = msg.job;
    const prev = activeJobs.get(job.jobId);
    activeJobs.set(job.jobId, job);
    updateProgressPanel(job);
    updateJobsBadge();
    // Only fire completion events once per job
    if (job.status === 'done' && !finishedJobs.has(job.jobId)) {
      finishedJobs.add(job.jobId);
      hideCancelBtn();
      setTimeout(() => closeProgress(), 2500);
      const label = job.type === 'delete' || job.type === 'delete-permanent' ? '🗑 Delete complete'
                  : job.type === 'trash-empty' ? '🗑 Trash emptied'
                  : job.type === 'upload'       ? `✓ Upload saved (${(job.sources||[]).length} file(s))`
                  : job.type === 'zip'           ? '🗜 Zip complete'
                  : job.type === 'unzip'         ? '📦 Extracted successfully'
                  : `✓ ${job.operation === 'move' ? 'Move' : 'Copy'} complete`;
      toast(label, 'ok');
      reload(); loadTrash();
    } else if (job.status === 'cancelled' && !finishedJobs.has(job.jobId)) {
      finishedJobs.add(job.jobId);
      hideCancelBtn();
      const cancelMsg = job.type === 'zip'   ? '⏹ Zip cancelled — open Jobs to resume'
                      : job.type === 'unzip' ? '⏹ Extract cancelled — open Jobs to resume'
                      : '⏹ Transfer cancelled — open Jobs to resume';
      toast(cancelMsg, 'warn');
      reload();
    } else if (job.status === 'error' && !finishedJobs.has(job.jobId)) {
      finishedJobs.add(job.jobId);
      hideCancelBtn();
      toast('⚠ ' + (job.error || 'Operation failed'), 'err');
    }
  }
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
async function nav(p) {
  curPath = p;
  if (histIdx < hist.length - 1) hist = hist.slice(0, histIdx + 1);
  if (hist[histIdx] !== p) { hist.push(p); histIdx++; }
  await loadDir(p);
  navBtns(); sidebarActive();
}

function goBack() { if (histIdx > 0) { histIdx--; curPath = hist[histIdx]; loadDir(curPath); navBtns(); } }
function goFwd()  { if (histIdx < hist.length - 1) { histIdx++; curPath = hist[histIdx]; loadDir(curPath); navBtns(); } }
function navBtns() {
  document.getElementById('btn-back').disabled = histIdx <= 0;
  document.getElementById('btn-fwd').disabled  = histIdx >= hist.length - 1;
}
function sidebarActive() {
  document.querySelectorAll('.sb-item[data-path]').forEach(el =>
    el.classList.toggle('active', el.dataset.path === curPath));
}

async function loadDir(p) {
  setStatus('Loading…', false);
  selected.clear(); selUI();
  try {
    const r = await fetch(`/api/list?path=${enc(p)}`);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    entries = d.entries.sort((a,b) => {
      if (a.type !== b.type) return a.type === 'directory' ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
    filtered = [...entries];
    renderFiles();
    renderBC(p);
    setStatus(`${entries.length} items`, true);
  } catch(e) {
    setStatus('Error: ' + e.message, false);
    toast('Failed: ' + e.message, 'err');
  }
}

function reload() { loadDir(curPath); }

// ═══════════════════════════════════════════
// BREADCRUMB
// ═══════════════════════════════════════════
function renderBC(p) {
  const bc = document.getElementById('breadcrumb');
  const parts = p.split('/').filter(Boolean);
  let html = `<span class="bc-item ${!parts.length?'active':''}" data-navpath="/">root</span>`;
  let acc = '';
  parts.forEach((pt, i) => {
    acc += '/' + pt;
    html += `<span class="bc-sep">/</span><span class="bc-item ${i===parts.length-1?'active':''}" data-navpath="${esc(acc)}">${esc(pt)}</span>`;
  });
  bc.innerHTML = html;
  bc.querySelectorAll('[data-navpath]').forEach(el => {
    el.addEventListener('click', () => nav(el.dataset.navpath));
  });
}

// ═══════════════════════════════════════════
// RENDER FILES
// ═══════════════════════════════════════════
const ICONS = {
  dir: '📁', img: '🖼', video: '🎬', audio: '🎵', pdf: '📄',
  zip: '📦', code: '⌨', text: '📝', config: '⚙', web: '🌐',
  dot: '🔒', file: '📄',
  symDir: '🔗', symFile: '🔗', symBroken: '⚠'
};
function fileIcon(e) {
  if (e.type === 'symlink-broken') return ICONS.symBroken;
  if (e.type === 'symlink-dir')    return ICONS.symDir;
  if (e.type === 'symlink-file') {
    // Show the file type icon with a link overlay handled in CSS
    const m = e.mime || '', x = e.name.split('.').pop().toLowerCase();
    if (m.startsWith('image/')) return ICONS.img;
    if (m.startsWith('video/')) return ICONS.video;
    if (m.startsWith('audio/')) return ICONS.audio;
    return ICONS.symFile;
  }
  if (e.type === 'directory') return ICONS.dir;
  const m = e.mime || '', x = e.name.split('.').pop().toLowerCase();
  if (m.startsWith('image/')) return ICONS.img;
  if (m.startsWith('video/')) return ICONS.video;
  if (m.startsWith('audio/')) return ICONS.audio;
  if (m.includes('pdf')) return ICONS.pdf;
  if (m.includes('zip')||m.includes('tar')||m.includes('gz')||m.includes('rar')||x==='7z') return ICONS.zip;
  if (['js','ts','jsx','tsx','py','go','rs','cpp','c','h','java','sh','bash','rb','php','lua','swift'].includes(x)) return ICONS.code;
  if (['html','css','scss','svg'].includes(x)) return ICONS.web;
  if (['json','yaml','yml','toml','xml','env','ini','conf','cfg'].includes(x)) return ICONS.config;
  if (['md','txt','log','rst'].includes(x)) return ICONS.text;
  if (e.name.startsWith('.')) return ICONS.dot;
  return ICONS.file;
}
function fmtSize(b) {
  if (b == null || b === '') return '—';
  const unit = getSetting('sizeUnit');
  if (unit === 'bytes') return b.toLocaleString() + ' B';
  if (unit === 'kb')    return (b/1024).toFixed(1) + ' KB';
  if (!b) return '—';
  if (b < 1024) return b + 'B';
  if (b < 1024**2) return (b/1024).toFixed(1) + 'K';
  if (b < 1024**3) return (b/1024**2).toFixed(1) + 'M';
  return (b/1024**3).toFixed(2) + 'G';
}
function fmtDate(d) {
  if (!d) return '—';
  const dt  = new Date(d);
  const fmt = getSetting('dateFormat');
  if (fmt === 'full') return dt.toISOString().slice(0,16).replace('T',' ');
  if (fmt === 'relative') {
    const diff = Date.now() - dt.getTime();
    if (diff < 60000)   return 'just now';
    if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000)return Math.floor(diff/3600000) + 'h ago';
    if (diff < 2592000000) return Math.floor(diff/86400000) + 'd ago';
  }
  return dt.toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' ' +
         dt.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}
function filterFiles() {
  const q = document.getElementById('search').value.toLowerCase();
  const showHidden = getSetting('showHidden');
  let base = entries.filter(e => showHidden || !e.name.startsWith('.'));
  filtered = q ? base.filter(e => e.name.toLowerCase().includes(q)) : base;
  renderFiles();
}
function renderFiles() {
  const area = document.getElementById('file-area');
  if (!filtered.length) {
    area.innerHTML = `<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-txt">This folder is empty</div></div>`;
    return;
  }
  const cuts = clipboard && clipboard.op === 'move' ? new Set(clipboard.items.map(i=>i.path)) : new Set();
  if (viewMode === 'grid') {
    area.innerHTML = `<div class="file-grid">${filtered.map(e=>gridItem(e,cuts)).join('')}</div>`;
  } else {
    area.innerHTML = `<div class="list-head"><span></span><span></span><span>Name</span><span>Size</span><span>Modified</span><span>Perms</span></div><div class="file-list">${filtered.map(e=>listItem(e,cuts)).join('')}</div>`;
  }
  area.querySelectorAll('[data-path]').forEach(el => {
    el.addEventListener('click', ev => {
      clickItem(ev, el.dataset.path, el.dataset.type);
      if (getSetting('singleClickOpen') && !ev.shiftKey && !ev.ctrlKey && !ev.metaKey)
        dblItem(el.dataset.path, el.dataset.type);
    });
    el.addEventListener('dblclick', () => { if (!getSetting('singleClickOpen')) dblItem(el.dataset.path, el.dataset.type); });
    el.addEventListener('contextmenu', ev => ctxMenu(ev, el.dataset.path, el.dataset.type));
  });
}
function gridItem(e, cuts) {
  const s = selected.has(e.path), c = cuts.has(e.path);
  const isImg = e.mime && e.mime.startsWith('image/') && !e.isSymlink;
  const isBroken = e.type === 'symlink-broken';
  const iconHtml = isImg
    ? `<div class="grid-thumb"><img src="/api/preview?path=${enc(e.path)}" loading="lazy" onerror="this.parentNode.innerHTML='<span class=grid-thumb-fail>🖼</span>'"></div>`
    : `<div class="grid-icon">${fileIcon(e)}</div>`;
  const symBadge = e.isSymlink
    ? `<div class="sym-badge ${isBroken?'sym-broken':''}" title="${isBroken?'Broken symlink':'Symlink → '+esc(e.linkTarget||'')}">⇢</div>`
    : '';
  return `<div class="fitem-grid ${s?'sel':''} ${c?'cut':''} ${isBroken?'sym-broken-item':''}" data-path="${e.path}" data-type="${e.type}">
    <div class="item-cb">${s?'✓':''}</div>
    ${iconHtml}${symBadge}
    <div class="grid-name">${esc(e.name)}</div>
    <div class="grid-size">${e.type==='directory'||e.type==='symlink-dir'?'':fmtSize(e.size)}</div>
  </div>`;
}
function listItem(e, cuts) {
  const s = selected.has(e.path), c = cuts.has(e.path);
  const isBroken = e.type === 'symlink-broken';
  const symBadge = e.isSymlink
    ? `<span class="sym-badge-inline ${isBroken?'sym-broken':''}" title="${isBroken?'Broken symlink':'→ '+esc(e.linkTarget||'')}">⇢</span>`
    : '';
  const isDir = e.type === 'directory' || e.type === 'symlink-dir';
  return `<div class="fitem-list ${s?'sel':''} ${c?'cut':''} ${isBroken?'sym-broken-item':''}" data-path="${e.path}" data-type="${e.type}">
    <span class="item-cb-list">${s?'✓':''}</span>
    <span class="list-icon">${fileIcon(e)}</span>
    <span class="list-name">${esc(e.name)}${symBadge}</span>
    <span class="list-size">${isDir?'—':fmtSize(e.size)}</span>
    <span class="list-date">${fmtDate(e.modified)}</span>
    <span class="list-perm">${e.permissions||'—'}</span>
  </div>`;
}

// SELECTION
// ═══════════════════════════════════════════
let lastSel = null;
function clickItem(ev, p, type) {
  // Clicking the checkbox always toggles selection regardless of type
  const cbClicked = ev.target.classList.contains('item-cb') || ev.target.classList.contains('item-cb-list');
  const isDir = type === 'directory' || type === 'symlink-dir';

  if (isDir && !cbClicked && !ev.shiftKey && !ev.ctrlKey && !ev.metaKey) {
    nav(p); return;
  }
  if (ev.shiftKey && lastSel) {
    const all = filtered.map(e=>e.path), a = all.indexOf(lastSel), b = all.indexOf(p);
    const [lo,hi] = a<b?[a,b]:[b,a];
    all.slice(lo,hi+1).forEach(x => selected.add(x));
  } else if (ev.ctrlKey || ev.metaKey || cbClicked) {
    selected.has(p) ? selected.delete(p) : selected.add(p);
  } else {
    selected.clear(); selected.add(p);
  }
  lastSel = p; renderFiles(); selUI();
}
function dblItem(p, type) {
  if (type === 'directory' || type === 'symlink-dir') { nav(p); return; }
  if (type === 'symlink-broken') { toast('Broken symlink — target does not exist', 'warn'); return; }
  const ext = p.split('.').pop().toLowerCase();
  if (EDITABLE_EXTS_UI.has(ext)) { openEditor(p); return; }
  previewFile(p);
}
function selUI() {
  const n = selected.size;
  document.getElementById('ssel').textContent = n > 0 ? `${n} selected` : '';
  ['btn-cut','btn-copy','btn-del'].forEach(id => document.getElementById(id).style.display = n?'':'none');
  document.getElementById('btn-paste').style.display = clipboard?'':'none';
  // Highlight select-all button when all visible items are selected
  const selAllBtn = document.getElementById('btn-selall');
  if (selAllBtn) selAllBtn.style.color = (n > 0 && n === filtered.length) ? 'var(--accent3)' : '';
}
function toggleSelectAll() {
  if (selected.size === filtered.length && filtered.length > 0) {
    selected.clear();
  } else {
    filtered.forEach(e => selected.add(e.path));
  }
  lastSel = null; renderFiles(); selUI();
}

function cutSel()  { clipboard = { items: getSelEntries(), op: 'move' }; toast(`✂ ${clipboard.items.length} cut`, 'ok'); renderFiles(); selUI(); }

async function doPaste() {

}

// ═══════════════════════════════════════════
// TRANSFER
// ═══════════════════════════════════════════
async function doTransfer(sources, destination, operation, conflictResolutions = null) {
  // If we already have resolutions (called from conflict modal), skip check
  if (conflictResolutions !== null) {
    return _startTransfer(sources, destination, operation, conflictResolutions);
  }

  // Pre-flight: check for conflicts
  let checkData;
  try {
    const cr = await fetch('/api/transfer/check', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ sources, destination })
    });
    checkData = await cr.json();
  } catch (e) {
    // If check fails, proceed anyway with empty resolutions
    checkData = { conflicts: [] };
  }

  if (!checkData.conflicts || checkData.conflicts.length === 0) {
    return _startTransfer(sources, destination, operation, {});
  }

  // Show conflict resolution modal
  showConflictModal(checkData.conflicts, checkData.truncated, sources, destination, operation);
}

async function _startTransfer(sources, destination, operation, conflictResolutions) {
  showProgressPanel(`${operation==='move'?'Moving':'Copying'} ${sources.length} item(s)`);
  const r = await fetch('/api/transfer', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ sources, destination, operation, clientId: wsId, conflictResolutions })
  });
  const d = await r.json();
  if (d.jobId) activeJobs.set(d.jobId, { jobId: d.jobId, status: 'running', percent: 0, phase: 'starting', operation });
  updateJobsBadge();
}

// ═══════════════════════════════════════════
// CONFLICT RESOLUTION MODAL
// ═══════════════════════════════════════════
function showConflictModal(conflicts, truncated, sources, destination, operation) {
  const m = mkModal();
  m.style.maxWidth = '640px';
  m.style.minWidth = '480px';

  // Resolution state: destPath → 'overwrite'|'skip'|'keepboth'
  const resolutions = {};
  conflicts.forEach(c => { resolutions[c.destPath] = 'overwrite'; });

  function fmtSz(b) {
    if (b === undefined || b === null) return '—';
    if (b < 1024) return b + ' B';
    if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
    if (b < 1024*1024*1024) return (b/1024/1024).toFixed(1) + ' MB';
    return (b/1024/1024/1024).toFixed(2) + ' GB';
  }
  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  }
  function allSame() {
    const vals = Object.values(resolutions);
    return vals.length > 0 && vals.every(v => v === vals[0]) ? vals[0] : null;
  }

  function render() {
    const same = allSame();
    m.innerHTML = `
      <h2>⚠ ${conflicts.length}${truncated?'+':''} conflict${conflicts.length!==1?'s':''} found</h2>
      <p style="margin-bottom:14px;color:var(--text2);font-size:13px">
        ${conflicts.length} file${conflicts.length!==1?'s':''} already exist at the destination.
        Choose what to do with each one${truncated?' (showing first 500 — remaining will use bulk action)':'.'}</p>

      <div style="display:flex;gap:6px;margin-bottom:12px;align-items:center">
        <span style="font-size:11.5px;color:var(--text3);margin-right:4px">Apply to all:</span>
        ${['overwrite','skip','keepboth'].map(v => `
          <button onclick="applyAll('${v}')" style="
            padding:4px 12px;border-radius:6px;font-size:11.5px;cursor:pointer;
            font-family:var(--font-sans);font-weight:500;
            background:${same===v?'var(--accent)':'var(--surface3)'};
            color:${same===v?'#fff':'var(--text2)'};
            border:1px solid ${same===v?'transparent':'var(--border2)'};
            transition:0.12s">${v==='overwrite'?'⬆ Overwrite all':v==='skip'?'⊘ Skip all':'⊕ Keep both'}</button>
        `).join('')}
      </div>

      <div style="max-height:340px;overflow-y:auto;margin-bottom:14px;border:1px solid var(--border);border-radius:8px;overflow-x:hidden">
        ${conflicts.map((c, i) => `
          <div style="padding:10px 12px;${i>0?'border-top:1px solid var(--border)':''};display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start">
            <div style="min-width:0">
              <div style="font-size:12.5px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--font-mono)" title="${esc(c.name)}">${esc(c.name)}</div>
              <div style="display:flex;gap:16px;margin-top:5px;font-size:11px;font-family:var(--font-mono)">
                <div>
                  <div style="color:var(--text3);margin-bottom:1px">Incoming</div>
                  <div style="color:var(--text2)">${fmtSz(c.srcSize)}</div>
                  <div style="color:var(--text3)">${fmtDate(c.srcMtime)}</div>
                </div>
                <div style="color:var(--border2);align-self:center;font-size:16px">→</div>
                <div>
                  <div style="color:var(--text3);margin-bottom:1px">Existing</div>
                  <div style="color:var(--text2)">${fmtSz(c.dstSize)}</div>
                  <div style="color:var(--text3)">${fmtDate(c.dstMtime)}</div>
                </div>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
              ${['overwrite','skip','keepboth'].map(v => `
                <button onclick="setOne('${esc(c.destPath)}','${v}')" style="
                  padding:3px 10px;border-radius:5px;font-size:11px;cursor:pointer;
                  font-family:var(--font-sans);font-weight:500;white-space:nowrap;
                  background:${resolutions[c.destPath]===v?'var(--accent)':'var(--surface3)'};
                  color:${resolutions[c.destPath]===v?'#fff':'var(--text2)'};
                  border:1px solid ${resolutions[c.destPath]===v?'transparent':'var(--border2)'};
                  transition:0.12s">
                  ${v==='overwrite'?'⬆ Overwrite':v==='skip'?'⊘ Skip':'⊕ Keep both'}
                </button>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>

      <div style="padding:8px 12px;background:var(--surface2);border-radius:6px;margin-bottom:14px;font-size:11.5px;color:var(--text3)">
        <span style="color:var(--text2);font-weight:500">Summary: </span>
        ${['overwrite','skip','keepboth'].map(v => {
          const n = Object.values(resolutions).filter(r=>r===v).length;
          if (!n) return '';
          const label = v==='overwrite'?'overwrite':v==='skip'?'skip':'keep both';
          return `<span style="margin-right:12px">${n} ${label}</span>`;
        }).join('')}
      </div>

      <div class="modal-row">
        <button class="mbtn" onclick="closeModal()" style="margin-right:auto">Cancel</button>
        <button class="mbtn ok" onclick="applyResolutions()">
          ${operation==='move'?'Move':'Copy'} with these settings
        </button>
      </div>`;

    // Attach helpers to window so inline onclick works
    window._conflictState = { resolutions, conflicts, sources, destination, operation };
  }

  window.applyAll = function(val) {
    const s = window._conflictState;
    s.conflicts.forEach(c => { s.resolutions[c.destPath] = val; });
    render();
  };
  window.setOne = function(destPath, val) {
    const s = window._conflictState;
    s.resolutions[destPath] = val;
    render();
  };
  window.applyResolutions = function() {
    const s = window._conflictState;
    closeModal();
    _startTransfer(s.sources, s.destination, s.operation, s.resolutions);
  };

  render();
}

// Right-click on empty area
function bgCtxMenu(ev) {
  if (ev.target.closest('[data-path]')) return; // let item ctxmenu handle it
  ev.preventDefault();
  document.querySelectorAll('.ctxmenu').forEach(e=>e.remove());
  const m = document.createElement('div');
  m.className = 'ctxmenu';
  const extraItems = [];
  if (clipboard) extraItems.push({icon:'⊞', label:'Paste', fn:()=>doPaste()});
  if (selected.size > 0) extraItems.push({icon:'🗜', label:'Zip selected…', fn:()=>doZipSelected(null,null)});
  const items = [
    {icon:'📁', label:'New Folder',    fn:()=>showMkdir()},
    {icon:'📄', label:'New Text File', fn:()=>showNewFile()},
    ...(extraItems.length ? [{sep:true}, ...extraItems] : []),
  ];
  items.forEach(item => {
    if (item.sep) { const sep = document.createElement('div'); sep.className='ctx-sep'; m.appendChild(sep); return; }
    const el = document.createElement('div');
    el.className = 'ctx-item';
    el.innerHTML = `<span class="ctx-ico">${item.icon}</span>${esc(item.label)}`;
    el.addEventListener('click', () => {
      m.remove(); document.removeEventListener('click', dismiss);
      setTimeout(() => item.fn(), 150);
    });
    m.appendChild(el);
  });
  const {innerWidth:W,innerHeight:H}=window;
  let x=ev.clientX,y=ev.clientY;
  document.body.appendChild(m);
  const r=m.getBoundingClientRect();
  if(x+r.width>W)x=W-r.width-8;
  if(y+r.height>H)y=H-r.height-8;
  m.style.left=x+'px'; m.style.top=y+'px';
  const dismiss=e=>{if(!m.contains(e.target)){m.remove();document.removeEventListener('click',dismiss);}};
  setTimeout(()=>document.addEventListener('click',dismiss),50);
}

function positionCtxMenu(m, ev) {
  // Helper kept for compatibility
  const {innerWidth:W,innerHeight:H}=window;
  let x=ev.clientX,y=ev.clientY;
  document.body.appendChild(m);
  const r=m.getBoundingClientRect();
  if(x+r.width>W)x=W-r.width-8;
  if(y+r.height>H)y=H-r.height-8;
  m.style.left=x+'px'; m.style.top=y+'px';
}

async function showJobs() {

  const m = mkModal();
  m.style.maxWidth = '580px'; m.style.minWidth = '460px';
  const jobs = d.jobs || [];

  function jobStatusIcon(j) {
    if (j.status === 'done')      return '<span style="color:var(--green)">&#10003;</span>';
    if (j.status === 'error')     return '<span style="color:var(--red)">&#10007;</span>';
    if (j.status === 'cancelled') return '<span style="color:var(--yellow)">&#9632;</span>';
    return '<span style="display:inline-block;animation:spin 0.8s linear infinite">&#8635;</span>';
  }
  function elapsed(j) {
    const start = new Date(j.startedAt);
    const end = j.finishedAt ? new Date(j.finishedAt) : new Date();
    const s = Math.round((end - start) / 1000);
    return s < 60 ? s + 's' : Math.floor(s/60) + 'm ' + (s%60) + 's';
  }
  function jobHtml(j) {
    const statusClass = j.status === 'done' ? 'done' : j.status === 'error' ? 'error' : (j.phase || 'starting');
    const srcs = j.sources || [];
    const srcPreview = srcs.slice(0,2).map(s => s.split('/').pop()).join(', ') + (srcs.length > 2 ? ' +' + (srcs.length-2) + ' more' : '');
    const dest = j.destination ? j.destination.split('/').slice(-2).join('/') : '-';
    const logLines = j.log || [];
    const logId = 'log-' + j.jobId;
    const errBorder = j.status === 'error' ? ';border-color:rgba(217,95,95,0.35)' : j.status === 'cancelled' ? ';border-color:rgba(201,148,74,0.3)' : '';
    const barColor = j.status === 'error' ? 'var(--red)' : j.status === 'done' ? 'var(--green)' : 'linear-gradient(90deg,var(--accent),var(--accent3))';
    const typeIcon  = j.type==='zip' ? '🗜' : j.type==='unzip' ? '📦' : j.type==='upload' ? '↑' : j.type==='delete'||j.type==='delete-permanent' ? '🗑' : j.type==='trash-empty' ? '🗑' : '⇄';
    const typeLabel = j.type==='zip' ? 'Zip' : j.type==='unzip' ? 'Unzip' : j.type==='upload' ? 'Upload' : j.type==='delete' ? 'Delete' : j.type==='delete-permanent' ? 'Delete' : j.type==='trash-empty' ? 'Empty Trash' : (j.operation==='move'?'Move':'Copy');
    const isResumable = (j.status === 'error' || j.status === 'cancelled');
    const isCancellable = j.status === 'running';
    const hasResume = isResumable && (j.type === 'transfer' || j.type === 'zip' || j.type === 'unzip');
    const hasCancel = isCancellable && (j.type === 'transfer' || j.type === 'zip' || j.type === 'unzip');
    const resumeFn  = j.type==='zip'    ? `resumeZip('${j.jobId}')`
                    : j.type==='unzip'  ? `resumeUnzip('${j.jobId}')`
                    : `resumeTransfer('${j.jobId}')`;
    const cancelFn  = j.type==='zip'||j.type==='unzip' ? `cancelZipJob('${j.jobId}',this)` : `cancelJobFromPanel('${j.jobId}',this)`;
    return `<div style="padding:12px;border-radius:10px;border:1px solid var(--border)${errBorder};margin-bottom:8px;background:var(--surface2)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:16px">${jobStatusIcon(j)}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;color:var(--text);font-weight:500">${typeIcon} ${typeLabel} &middot; ${srcs.length} item${srcs.length!==1?'s':''}</div>
          <div style="font-size:11px;color:var(--text3);font-family:var(--font-mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(srcPreview)}</div>
        </div>
        <span class="phase-pill phase-${statusClass}">${j.status==='running'?j.phase||'running':j.status}</span>
      </div>
      <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:7px;font-size:11px;color:var(--text3);font-family:var(--font-mono)">
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0">&#8594; ${esc(dest)}</span>
        <span style="white-space:nowrap;flex-shrink:0">${elapsed(j)} &middot; ${fmtDate(j.startedAt)}</span>
      </div>
      <div style="height:5px;background:var(--surface4);border-radius:3px;overflow:hidden;margin-bottom:5px">
        <div style="height:100%;width:${j.percent||0}%;background:${barColor};border-radius:3px;transition:width 0.3s ease"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10.5px;color:var(--text3);font-family:var(--font-mono);margin-bottom:${logLines.length||j.error||hasResume||hasCancel?'8px':'0'}">
        <span>${j.currentFile?'&rarr; '+esc(j.currentFile):''}</span>
        <span>${j.percent||0}%${(j.filePercent&&j.filePercent!==j.percent)?' &middot; file: '+j.filePercent+'%':''}</span>
      </div>
      ${j.error ? `<div style="padding:6px 10px;background:rgba(217,95,95,0.08);border:1px solid rgba(217,95,95,0.2);border-radius:6px;font-size:11.5px;color:var(--red);font-family:var(--font-mono);margin-bottom:6px">${esc(j.error)}</div>` : ''}
      ${hasResume ? `<button onclick="${resumeFn}" style="background:var(--accentbg);border:1px solid var(--accent);color:var(--accent2);font-size:11.5px;font-family:var(--font-sans);font-weight:500;padding:5px 14px;border-radius:6px;cursor:pointer;margin-bottom:${logLines.length?'6px':'0'}">&#9654; Resume${j.type==='zip'?' (restart zip)':j.type==='unzip'?' (re-extract)':' from where it stopped'}</button>` : ''}
      ${hasCancel ? `<button onclick="${cancelFn}" style="background:rgba(217,95,95,0.08);border:1px solid rgba(217,95,95,0.25);color:var(--red);font-size:11.5px;font-family:var(--font-sans);font-weight:500;padding:5px 14px;border-radius:6px;cursor:pointer;margin-bottom:${logLines.length?'6px':'0'}">&#9632; Cancel</button>` : ''}
      ${logLines.length ? `<div>
        <button onclick="var el=document.getElementById('${logId}');el.style.display=el.style.display==='none'?'block':'none'" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;font-family:var(--font-mono);padding:2px 0;margin-bottom:4px">${logLines.length} log line${logLines.length!==1?'s':''} &#9660;</button>
        <div id="${logId}" style="display:none;background:var(--bg);border-radius:6px;padding:8px;max-height:110px;overflow-y:auto;font-family:var(--font-mono);font-size:10.5px;color:var(--red);line-height:1.5;border:1px solid var(--border)">
          ${logLines.map(l=>'<div>'+esc(l)+'</div>').join('')}
        </div></div>` : ''}
    </div>`;
  }

  m.innerHTML = `<h2>&#9881; Background Jobs</h2>
    <p style="margin-bottom:14px">Transfer jobs run server-side and survive browser disconnects.</p>
    <div style="max-height:420px;overflow-y:auto;margin-bottom:16px;padding-right:2px">
      ${!jobs.length
        ? '<div style="text-align:center;color:var(--text3);padding:32px;font-style:italic;font-family:var(--font-serif)">No jobs yet</div>'
        : [...jobs].reverse().map(j=>jobHtml(j)).join('')}
    </div>
    <div class="modal-row">
      <button class="mbtn" onclick="closeModal();setTimeout(showJobs,10)" style="margin-right:auto">&#8635; Refresh</button>
      ${getSetting('dozzleUrl') ? `<a class="mbtn" href="${esc(getSetting('dozzleUrl'))}" target="_blank" rel="noopener" style="text-decoration:none">📋 Dozzle Logs ↗</a>` : ''}
      <button class="mbtn" onclick="closeModal()">Close</button>
    </div>`;
}

// CONTEXT MENU
// ═══════════════════════════════════════════
function ctxMenu(ev, p, type) {
  ev.preventDefault(); ev.stopPropagation();
  if (!selected.has(p)) { selected.clear(); selected.add(p); lastSel=p; renderFiles(); selUI(); }
  document.querySelectorAll('.ctxmenu').forEach(e=>e.remove());
  const entry = filtered.find(x=>x.path===p);
  const multi = selected.size > 1;
  const m = document.createElement('div');
  m.className = 'ctxmenu';

  // Safe menu items using closures - no path string injection
  const menuItems = [];
  if (!multi && type==='directory') menuItems.push({icon:'📂', label:'Open',             fn:()=>dblItem(p,type)});
  if (!multi && type==='file') {
    const ext = p.split('.').pop().toLowerCase();
    if (EDITABLE_EXTS_UI.has(ext)) {
      menuItems.push({icon:'✏', label:'Edit',    fn:()=>openEditor(p)});
    }
    menuItems.push({icon:'👁', label:'Preview',  fn:()=>previewFile(p)},
                   {icon:'↓', label:'Download',  fn:()=>dlFile(p)});
  }
  menuItems.push({sep:true});
  menuItems.push({icon:'⎘', label:'Copy',          fn:()=>copySel()});
  menuItems.push({icon:'✂', label:'Cut',           fn:()=>cutSel()});
  if (clipboard) menuItems.push({icon:'⊞', label:'Paste here', fn:()=>doPaste()});
  menuItems.push({sep:true});
  if (!multi && entry) menuItems.push({icon:'✏', label:'Rename',     fn:()=>showRename(p, entry.name||'')});
  menuItems.push({icon:'ℹ', label:'Properties',    fn:()=>showProps(p)});
  menuItems.push({sep:true});
  // ── Pin to Places (directories only) ────────────────────────
  if (!multi && type === 'directory') {
    menuItems.push({icon:'📌', label:'Pin to Places', fn:()=>pinToPlaces(p, entry ? entry.name : p.split('/').pop())});
  }
  // ── Zip / Unzip ───────────────────────────────────────────────
  if (!multi) {
    const ext = p.split('.').pop().toLowerCase();
    if (ext === 'zip') {
      menuItems.push({icon:'📦', label:'Unzip here', fn:()=>doUnzip(p)});
    } else {
      menuItems.push({icon:'🗜', label:'Zip…',        fn:()=>doZipSelected(p, type)});
    }
  } else {
    menuItems.push({icon:'🗜', label:'Zip selected…',      fn:()=>doZipSelected(null, null)});
    menuItems.push({icon:'↓', label:'Download selected…', fn:()=>dlMultiSel()});
  }
  // ── AI Actions ────────────────────────────────────────────────
  if (!multi && entry) {
    const isImg = IMAGE_EXTS_UI.has((entry.name.split('.').pop()||'').toLowerCase()) ||
                  (entry.mime && entry.mime.startsWith('image/'));
    if (isImg) {
      menuItems.push({icon:'✦', label:'AI Describe Image', fn:()=>aiDescribeImage(p, entry.name)});
    } else if (type === 'directory') {
      menuItems.push({icon:'✦', label:'AI Task…',          fn:()=>showAITask(p)});
      menuItems.push({icon:'✦', label:'AI Summarize',      fn:()=>aiSummarize(p, entry.name)});
      menuItems.push({icon:'✦', label:'AI Suggest Name',   fn:()=>aiSuggestName(p, entry.name)});
    } else {
      menuItems.push({icon:'✦', label:'AI Summarize',      fn:()=>aiSummarize(p, entry.name)});
      menuItems.push({icon:'✦', label:'AI Suggest Name',   fn:()=>aiSuggestName(p, entry.name)});
      menuItems.push({icon:'✦', label:'AI Tag File',       fn:()=>aiTag(p, entry.name)});
    }
  }
  menuItems.push({sep:true});
  menuItems.push({icon:'🗑', label:'Move to Trash',      fn:()=>delSel(),  red:true});
  menuItems.push({icon:'💀', label:'Delete Permanently', fn:()=>permDel(), red:true});

  menuItems.forEach((item, idx) => {
    if (item.sep) {
      const sep = document.createElement('div'); sep.className='ctx-sep'; m.appendChild(sep);
    } else {
      const el = document.createElement('div');
      el.className = 'ctx-item' + (item.red ? ' red' : '');
      el.innerHTML = `<span class="ctx-ico">${item.icon}</span>${esc(item.label)}`;
      el.addEventListener('click', () => {
        m.remove();
        document.removeEventListener('click', dismiss);
        // Use 150ms delay — ensures the click event fully propagates and dismiss handler
        // has already fired/cleared before item.fn() tries to open a new modal
        setTimeout(() => item.fn(), 150);
      });
      m.appendChild(el);
    }
  });

  const {innerWidth:W,innerHeight:H}=window;
  let x=ev.clientX,y=ev.clientY;
  document.body.appendChild(m);
  const r=m.getBoundingClientRect();
  if(x+r.width>W)x=W-r.width-8;
  if(y+r.height>H)y=H-r.height-8;
  m.style.left=x+'px'; m.style.top=y+'px';
  const dismiss=e=>{if(!m.contains(e.target)){m.remove();document.removeEventListener('click',dismiss);}};
  setTimeout(()=>document.addEventListener('click',dismiss),50);
}

function previewFile(p) {
  const e = filtered.find(x=>x.path===p);
  if (!e) return;
  const mime = e.mime||'', ext = e.name.split('.').pop().toLowerCase();
  const m = mkModal();
  if (mime.startsWith('image/')) {
    m.innerHTML = `<h2>🖼 ${esc(e.name)}</h2><img src="/api/preview?path=${enc(p)}" style="max-width:100%;max-height:58vh;border-radius:8px;margin-bottom:16px;display:block"><div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button><button class="mbtn ok" onclick="dlFile('${esc(p)}')">↓ Download</button></div>`;
  } else if (mime.startsWith('video/')) {
    m.innerHTML = `<h2>🎬 ${esc(e.name)}</h2><video controls src="/api/preview?path=${enc(p)}" style="max-width:100%;max-height:58vh;border-radius:8px;margin-bottom:16px"></video><div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button></div>`;
  } else if (mime.startsWith('text/')||['json','yaml','yml','toml','xml','sh','py','js','ts','md','log','conf','cfg','env','rs','go','rb'].includes(ext)) {
    m.innerHTML = `<h2>📝 ${esc(e.name)}</h2><p>Loading…</p>`;
    fetch(`/api/preview?path=${enc(p)}`).then(r=>r.text()).then(txt=>{
      m.innerHTML = `<h2>📝 ${esc(e.name)}</h2><pre style="background:var(--surface2);border-radius:8px;padding:14px;overflow:auto;max-height:55vh;font-family:var(--font-mono);font-size:12px;color:var(--text2);border:1px solid var(--border);margin-bottom:16px;white-space:pre-wrap;line-height:1.5">${esc(txt.slice(0,80000))}</pre><div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button><button class="mbtn ok" onclick="dlFile('${esc(p)}')">↓ Download</button></div>`;
    });
  } else {
    m.innerHTML = `<h2>📄 ${esc(e.name)}</h2><p>No preview available.<br><span style="font-family:var(--font-mono);font-size:12px;color:var(--text3)">${mime||'unknown type'} · ${fmtSize(e.size)}</span></p><div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button><button class="mbtn ok" onclick="dlFile('${esc(p)}')">↓ Download</button></div>`;
  }
}
function showProps(p) {
  const e = filtered.find(x => x.path === p);
  if (!e) { toast('Item not found in current view', 'err'); return; }

  const isDir    = e.type === 'directory' || e.type === 'symlink-dir';
  const isBroken = e.type === 'symlink-broken';
  const icon = isDir
    ? `<div style="text-align:center;font-size:44px;margin-bottom:14px">&#128193;</div>`
    : (e.mime && e.mime.startsWith('image/') && !e.isSymlink
        ? `<img src="/api/preview?path=${enc(p)}" style="max-width:100%;max-height:130px;object-fit:contain;border-radius:8px;display:block;margin:0 auto 14px" onerror="this.style.display='none'">`
        : `<div style="text-align:center;font-size:44px;margin-bottom:14px">${fileIcon(e)}</div>`);

  const m = mkModal();

  function renderTable(sizeVal) {
    let typeLabel = isDir ? 'Directory' : (e.mime || 'File');
    if (e.isSymlink) typeLabel += isBroken ? ' (broken symlink)' : ' (symlink)';
    const rows = [
      ['Name',        esc(e.name)],
      ['Path',        esc(e.path)],
      ['Type',        esc(typeLabel)],
    ];
    if (e.isSymlink) rows.push(['→ Target', `<span style="font-family:var(--font-mono);color:${isBroken?'var(--red)':'var(--accent3)'}">${esc(e.linkTarget||'unknown')}</span>`]);
    rows.push(
      ['Size',        sizeVal],
      ['Modified',    esc(fmtDate(e.modified))],
      ['Permissions', esc(e.permissions || '—')],
    );
    return rows.map(([k,v]) => `<tr>
      <td style="color:var(--text3);padding:7px 0;width:100px;vertical-align:top;font-family:var(--font-sans);font-size:12px">${k}</td>
      <td style="color:var(--text);padding:7px 0;font-family:var(--font-mono);font-size:11.5px;word-break:break-all" id="prop-${k.toLowerCase()}">${v}</td>
    </tr>`).join('');
  }

  const initialSize = isDir
    ? `<span id="prop-dirsize-val" style="color:var(--text3);font-style:italic">Calculating…</span>`
    : esc(fmtSize(e.size));

  m.innerHTML = `<h2>&#8505; Properties</h2>
    <div style="background:var(--surface2);border-radius:10px;padding:16px;border:1px solid var(--border);margin-bottom:16px">
      ${icon}
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        ${renderTable(initialSize)}
      </table>
    </div>
    <div class="modal-row">
      <button class="mbtn" onclick="closeModal()">Close</button>
      ${!isDir && !isBroken ? `<button class="mbtn ok" onclick="dlFile('${esc(p)}')">&#8595; Download</button>` : ''}
    </div>`;

  // For directories: stream size via SSE — no blocking, updates live
  if (isDir) {
    const evtSrc = new EventSource(`/api/dirsize?path=${enc(p)}`);
    let done = false;
    evtSrc.onmessage = ev => {
      try {
        const d = JSON.parse(ev.data);
        const el = document.getElementById('prop-dirsize-val');
        if (!el) { evtSrc.close(); return; }
        if (d.done) {
          done = true;
          evtSrc.close();
          const sizeStr = fmtSize(d.size || 0);
          const fileStr = d.files ? ` (${d.files.toLocaleString()} files)` : '';
          const note    = d.partial ? ' ~' : '';
          el.textContent = note + sizeStr + fileStr;
          el.style.cssText = d.partial ? 'color:var(--text2);font-style:italic' : '';
        } else if (d.error) {
          done = true;
          evtSrc.close();
          el.textContent = 'Permission denied';
          el.style.color = 'var(--text3)';
          el.style.fontStyle = 'italic';
        }
      } catch {}
    };
    evtSrc.onerror = () => {
      // SSE errors usually mean the stream closed cleanly after sending data,
      // or a transient reconnect. Only show a message if we truly got no data.
      evtSrc.close();
      if (!done) {
        const el = document.getElementById('prop-dirsize-val');
        if (el && (el.textContent === 'Calculating…' || el.textContent === '')) {
          el.textContent = 'Unavailable';
          el.style.color = 'var(--text3)';
          el.style.fontStyle = 'italic';
        }
      }
    };
    // Clean up if modal closed before stream finishes
    const obs = new MutationObserver(() => {
      if (!document.getElementById('prop-dirsize-val')) { evtSrc.close(); obs.disconnect(); }
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }
}
function dlFile(p) { window.location.href = `/api/download?path=${enc(p)}`; }

async function dlMultiSel() {
  const sel = [...selected];
  if (!sel.length) return;
  // Single item — direct download
  if (sel.length === 1) { dlFile(sel[0]); return; }
  // Multiple items — zip on server then download
  const zipName  = `download-${Date.now()}.zip`;
  const destPath = curPath.replace(/\/+$/, '') + '/' + zipName;
  toast(`⏳ Preparing zip of ${sel.length} items…`, 'ok');
  try {
    const r = await fetch('/api/zip', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ sources: sel, destination: destPath, clientId: wsId })
    });
    const d = await r.json();
    if (!d.jobId) { toast('Failed to start zip', 'err'); return; }
    // Poll until done
    await new Promise((resolve, reject) => {
      const poll = setInterval(async () => {
        try {
          const jr = await fetch('/api/jobs');
          const jd = await jr.json();
          const job = (jd.jobs || []).find(j => j.jobId === d.jobId);
          if (!job) { clearInterval(poll); reject(new Error('Job lost')); return; }
          if (job.status === 'done') { clearInterval(poll); resolve(); }
          else if (job.status === 'error' || job.status === 'cancelled') {
            clearInterval(poll); reject(new Error(job.error || 'Zip failed'));
          }
        } catch (e) { clearInterval(poll); reject(e); }
      }, 500);
    });
    window.location.href = `/api/download?path=${enc(destPath)}`;
    // Clean up temp zip after browser starts download
    setTimeout(async () => {
      try {
        await fetch('/api/delete-permanent', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ paths: [destPath] })
        });
      } catch {}
      reload();
    }, 4000);
  } catch(e) {
    toast('Download failed: ' + e.message, 'err');
  }
}
