    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
    New Folder
  </div>
  <div class="action-sheet-item" onclick="closeMobileActions();showNewFile()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    New File
  </div>
</div>

<!-- ── iOS INSTALL BANNER ─────────────────────────────── -->
<div class="ios-install-banner" id="ios-install-banner">
  <div class="ios-install-banner-icon">
    <svg width="26" height="26" viewBox="0 0 100 32" fill="none"><rect x="1" y="1" width="28" height="28" rx="7" fill="#c4663a" opacity="0.3"/><path d="M8 22V10h2.2l7.4 8.6V10H20v12h-2.2L10.4 13.4V22H8z" fill="#f09060"/></svg>
  </div>
  <div class="ios-install-banner-text">
    <strong>Add Nova to Home Screen</strong>
    <span>Tap <strong>Share</strong> then "Add to Home Screen"</span>
  </div>
  <button class="ios-install-banner-close" onclick="dismissIOSBanner()" aria-label="Dismiss">×</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// NOVA PWA — Native-feel Touch & Mobile Enhancements
// ═══════════════════════════════════════════════════════════

// ── Environment detection ─────────────────────────────────
const isIOS      = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isAndroid  = /android/i.test(navigator.userAgent);
const isMobile   = () => window.innerWidth <= 600 || ('ontouchstart' in window);
const isStandalone = () =>
  window.matchMedia('(display-mode: standalone)').matches ||
  window.matchMedia('(display-mode: minimal-ui)').matches ||
  window.navigator.standalone === true;

// ── Theme color for Android Chrome status bar ──────────────
// In standalone PWA, set to bg so status bar blends with titlebar
function syncThemeColor() {
  const meta = document.querySelector('meta[name="theme-color"]');
  if (!meta) return;
  meta.setAttribute('content', isStandalone() ? '#211f1c' : '#c4663a');
}
syncThemeColor();
window.matchMedia('(display-mode: standalone)').addEventListener('change', syncThemeColor);

// ── iOS install banner ────────────────────────────────────
function checkIOSInstall() {
  if (!isIOS || isStandalone()) return;
  try { if (localStorage.getItem('nova-ios-banner-dismissed')) return; } catch {}
  setTimeout(() => {
    const b = document.getElementById('ios-install-banner');
    if (b) b.classList.add('show');
  }, 3500);
}
function dismissIOSBanner() {
  const b = document.getElementById('ios-install-banner');
  if (b) b.classList.remove('show');
  try { localStorage.setItem('nova-ios-banner-dismissed', '1'); } catch {}
}
checkIOSInstall();

// ── Mobile nav active state ───────────────────────────────
function mnavSetActive(id) {
  document.querySelectorAll('.mnav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(id);
  if (btn) btn.classList.add('active');
}
function mnavFiles() {
  mnavSetActive('mnav-files');
  closeMobileSidebar();
  exitMultiselect();
}
function mnavSearch() {
  mnavSetActive('mnav-search');
  const si = document.querySelector('.search input');
  if (si) { si.focus(); si.select(); }
}

// ── Sidebar drawer ────────────────────────────────────────
let sidebarOpen = false;
function toggleMobileSidebar() {
  sidebarOpen ? closeMobileSidebar() : openMobileSidebar();
}
function openMobileSidebar() {
  sidebarOpen = true;
  document.querySelector('.sidebar')?.classList.add('mobile-open');
  document.getElementById('sidebar-backdrop')?.classList.add('open');
  mnavSetActive('mnav-sidebar');
  history.pushState({ nova: 'sidebar' }, '');
}
function closeMobileSidebar() {
  sidebarOpen = false;
  document.querySelector('.sidebar')?.classList.remove('mobile-open');
  document.getElementById('sidebar-backdrop')?.classList.remove('open');
  mnavSetActive('mnav-files');
}

// ── Action sheet (FAB) ────────────────────────────────────
let actionSheetOpen = false;
function showMobileActions() {
  actionSheetOpen = true;
  document.getElementById('action-sheet')?.classList.add('open');
  document.getElementById('as-backdrop')?.classList.add('open');
  history.pushState({ nova: 'actionsheet' }, '');
}
function closeMobileActions() {
  actionSheetOpen = false;
  document.getElementById('action-sheet')?.classList.remove('open');
  document.getElementById('as-backdrop')?.classList.remove('open');
}

// ── Multi-select mode ─────────────────────────────────────
// On touch: long-press enters multiselect mode, then taps toggle items
let multiselectMode = false;

function enterMultiselect(path) {
  multiselectMode = true;
  document.body.classList.add('multiselect-mode');
  // Clear any existing selection, then select the triggering item
  selected.clear();
  if (path) {
    selected.add(path);
    lastSel = path;
    renderFiles();
  }
  selUI(); // update desktop toolbar + touch bar
  if (navigator.vibrate) navigator.vibrate(40);
  history.pushState({ nova: 'multiselect' }, '');
}

function exitMultiselect() {
  multiselectMode = false;
  document.body.classList.remove('multiselect-mode');
  selected.clear();
  renderFiles();
  selUI();
  updateTouchSelBar();
}

// selUI and updateTouchSelBar moved to script block 2

// ── Touch item interaction ────────────────────────────────
// In multiselect mode: tap = toggle; out of multiselect: tap = nav/open, long-press = enter multiselect
let lpTimer = null;
let lpFired  = false;
let touchStartPath = null;
let touchStartType = null;
let touchStartX = 0, touchStartY = 0;
let touchHasMoved = false;

document.addEventListener('touchstart', ev => {
  lpFired = false;
  touchHasMoved = false;
  const el = ev.target.closest('[data-path]');
  if (!el) return;
  touchStartPath = el.dataset.path;
  touchStartType = el.dataset.type;
  touchStartX = ev.touches[0].clientX;
  touchStartY = ev.touches[0].clientY;
  // Capture touch coordinates now — ev.touches is empty by the time the timer fires
  const touchX = ev.touches[0].clientX;
  const touchY = ev.touches[0].clientY;

  lpTimer = setTimeout(() => {
    if (touchHasMoved) return;
    lpFired = true;
    if (navigator.vibrate) navigator.vibrate(40);
    document.querySelectorAll('.ctxmenu').forEach(e => e.remove());

    // Snapshot path/type — enterMultiselect may re-render DOM
    const lp_path = touchStartPath;
    const lp_type = touchStartType;

    // Enter multiselect so the item appears selected
    if (!multiselectMode) enterMultiselect(lp_path);

    // Show the full context menu (AI, pin, rename, delete, etc.)
    // openedAt timestamp inside ctxMenu will guard against the imminent touchend
    const fakeMouse = {
      clientX: touchX,
      clientY: touchY,
      preventDefault: () => {}, stopPropagation: () => {}
    };
    ctxMenu(fakeMouse, lp_path, lp_type);
  }, 480);
}, { passive: true });

document.addEventListener('touchmove', ev => {
  const dx = Math.abs(ev.touches[0].clientX - touchStartX);
  const dy = Math.abs(ev.touches[0].clientY - touchStartY);
  if (dx > 8 || dy > 8) {
    touchHasMoved = true;
    if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
  }
}, { passive: true });

document.addEventListener('touchend', ev => {
  if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
  if (lpFired) return; // long press handled, skip tap

  const el = ev.target.closest('[data-path]');
  if (!el || touchHasMoved) return;

  const p = el.dataset.path;
  const type = el.dataset.type;
  const cbClicked = ev.target.classList.contains('item-cb') ||
                    ev.target.classList.contains('item-cb-list');

  if (multiselectMode || cbClicked) {
    ev.preventDefault();
    // Toggle selection
    selected.has(p) ? selected.delete(p) : selected.add(p);
    lastSel = p;
    renderFiles();
    selUI();
    // Exit multiselect if nothing selected
    if (selected.size === 0) exitMultiselect();
  }
  // Non-multiselect tap → handled by existing click handlers
});

// Prevent default context menu on long-press (Android Chrome)
document.addEventListener('contextmenu', ev => {
  if (isMobile() && ev.target.closest('[data-path]')) {
    ev.preventDefault();
  }
});

// ── Pull to refresh ───────────────────────────────────────
(function setupPTR() {
  let startY = 0, pulling = false, indicator = null;
  document.addEventListener('touchstart', ev => {
    const a = document.querySelector('.file-area');
    if (!a?.contains(ev.target)) return;
    startY = ev.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchmove', ev => {
    const a = document.querySelector('.file-area');
    if (!a?.contains(ev.target) || a.scrollTop > 0) return;
    const dy = ev.touches[0].clientY - startY;
    if (dy < 10) return;
    const pull = Math.min(dy * 0.35, 60);
    if (!indicator) {
      indicator = document.createElement('div');
      indicator.className = 'ptr-indicator';
      indicator.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-.07-4.14"/></svg>`;
      a.prepend(indicator);
    }
    indicator.style.top = (pull - 46) + 'px';
    indicator.style.opacity = Math.min(pull / 44, 1).toString();
    pulling = pull >= 52;
    if (pulling) indicator.style.transform = 'translateX(-50%) rotate(180deg)';
  }, { passive: true });
  document.addEventListener('touchend', () => {
    if (indicator) { indicator.remove(); indicator = null; }
    if (pulling) { pulling = false; typeof reload === 'function' && reload(); }
    pulling = false;
  });
  document.addEventListener('touchcancel', () => {
    if (indicator) { indicator.remove(); indicator = null; }
    pulling = false;
  });
})();

// ── Swipe-left list item → context menu ──────────────────
(function setupSwipe() {
  let swipeEl = null, sx = 0, sy = 0, hint = null;

  function clearSwipe() {
    if (hint) { hint.remove(); hint = null; }
    swipeEl = null;
  }

  document.addEventListener('touchstart', ev => {
    const el = ev.target.closest('.fitem-list');
    if (!el) { swipeEl = null; return; }
    swipeEl = el; sx = ev.touches[0].clientX; sy = ev.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchmove', ev => {
    if (!swipeEl) return;
    const dx = ev.touches[0].clientX - sx;
    const dy = Math.abs(ev.touches[0].clientY - sy);
    if (dy > 16) { clearSwipe(); return; }
    if (dx < -24) {
      if (!hint) {
        hint = document.createElement('div');
        hint.className = 'swipe-action-hint';
        hint.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg><span>More</span>`;
        swipeEl.appendChild(hint);
      }
      const reveal = Math.min((Math.abs(dx) - 24) / 48, 1);
      hint.style.opacity = reveal.toString();
      hint.classList.toggle('show', reveal > 0.5);
    }
  }, { passive: true });
  document.addEventListener('touchend', ev => {
    if (!swipeEl) return;
    const dx = ev.changedTouches[0].clientX - sx;
    const el = swipeEl;
    clearSwipe();
    if (dx < -64 && el.dataset.path) {
      if (navigator.vibrate) navigator.vibrate(25);
      const r = el.getBoundingClientRect();
      ctxMenu(
        { clientX: r.right - 20, clientY: r.top + r.height / 2, preventDefault: ()=>{}, stopPropagation: ()=>{} },
        el.dataset.path, el.dataset.type
      );
    }
  });
  // Clean up hint if touch is cancelled (e.g. system gesture, phone call)
  document.addEventListener('touchcancel', clearSwipe);
})();

// ── Prevent double-tap zoom ───────────────────────────────
(function noDoubleTapZoom() {
  let last = 0;
  document.addEventListener('touchend', ev => {
    const el = ev.target.closest('button, .sb-item, .fitem-grid, .fitem-list, .mnav-btn, .ctx-item');
    if (!el) return;
    const now = Date.now();
    if (now - last < 320) ev.preventDefault();
    last = now;
  }, { passive: false });
})();

// ── Back button / gesture handling ───────────────────────
window.addEventListener('popstate', ev => {
  const state = ev.state?.nova;
  if (state === 'sidebar') { closeMobileSidebar(); history.pushState({ nova: null }, ''); }
  else if (state === 'actionsheet') { closeMobileActions(); history.pushState({ nova: null }, ''); }
  else if (state === 'multiselect') { exitMultiselect(); history.pushState({ nova: null }, ''); }
  else if (sidebarOpen) { closeMobileSidebar(); history.pushState({ nova: null }, ''); }
  else if (actionSheetOpen) { closeMobileActions(); history.pushState({ nova: null }, ''); }
  else if (multiselectMode) { exitMultiselect(); history.pushState({ nova: null }, ''); }
  else if (document.querySelectorAll('.ctxmenu').length) {
    document.querySelectorAll('.ctxmenu').forEach(e => e.remove());
    history.pushState({ nova: null }, '');
  }
});
history.replaceState({ nova: null }, '');

// ── iOS keyboard: scroll input into view ─────────────────
if (isIOS) {
  document.addEventListener('focusin', ev => {
    if (ev.target.tagName === 'INPUT' || ev.target.tagName === 'TEXTAREA') {
      setTimeout(() => ev.target.scrollIntoView({ behavior: 'smooth', block: 'center' }), 380);
    }
  });
  // Fix: iOS sometimes leaves viewport shifted after keyboard close
  document.addEventListener('focusout', () => {
    setTimeout(() => window.scrollTo(0, 0), 150);
  });
}

// ── Screen Wake Lock ──────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
  }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
}
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && wakeLock !== null) await requestWakeLock();
});

// ── Resize: exit multiselect on desktop breakpoint ───────
window.addEventListener('resize', () => {
  if (window.innerWidth > 600 && multiselectMode) exitMultiselect();
});
</script>
</body>
</html>
