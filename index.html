let editorState = null; // { path, content, dirty, savedContent }

async function openEditor(p) {
  const name = p.split('/').pop();
  const m = mkModal();
  m.classList.add('editor-modal');

  m.innerHTML = `
    <div class="editor-wrap">
      <div class="editor-toolbar">
        <span class="editor-filename" id="ed-name" title="${esc(p)}">${esc(name)}</span>
        <span class="editor-status" id="ed-status">Loading…</span>
        <button class="mbtn" style="padding:4px 12px;font-size:12px" onclick="closeModal();editorState=null">✕ Close</button>
        <button class="mbtn ok" style="padding:4px 14px;font-size:12px" id="ed-save" onclick="saveEditor()" disabled>Save</button>
      </div>
      <textarea class="editor-textarea" id="ed-area" spellcheck="false" placeholder="Loading…"></textarea>
      <div class="editor-footer">
        <span style="font-size:11px;color:var(--text3);font-family:var(--font-mono)" id="ed-info">—</span>
        <div style="display:flex;gap:8px">
          <span style="font-size:11px;color:var(--text3)">Ctrl+S to save · Ctrl+Z undo</span>
        </div>
      </div>
    </div>`;

  try {
    const r = await fetch(`/api/file/read?path=${enc(p)}`);
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Cannot read file');

    editorState = { path: p, content: d.content, dirty: false, savedContent: d.content };

    const ta = document.getElementById('ed-area');
    ta.value = d.content;

    const lines = d.content.split('\n').length;
    const info  = document.getElementById('ed-info');
    if (info) info.textContent = `${lines.toLocaleString()} lines · ${fmtSize(d.size)}`;

    const status = document.getElementById('ed-status');
    if (status) { status.textContent = 'Ready'; status.style.color = 'var(--green)'; }

    const saveBtn = document.getElementById('ed-save');

    ta.addEventListener('input', () => {
      if (!editorState) return;
      const wasDirty = editorState.dirty;
      editorState.content = ta.value;
      editorState.dirty   = ta.value !== editorState.savedContent;
      if (editorState.dirty !== wasDirty) {
        const fnEl = document.getElementById('ed-name');
        if (fnEl) {
          fnEl.textContent = editorState.dirty ? name + ' ●' : name;
          fnEl.style.color = editorState.dirty ? 'var(--accent2)' : '';
        }
        if (saveBtn) saveBtn.disabled = !editorState.dirty;
      }
      // Update line count
      const l = ta.value.split('\n').length;
      if (info) info.textContent = `${l.toLocaleString()} lines · ${fmtSize(new Blob([ta.value]).size)}`;
    });

    ta.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveEditor(); }
      // Tab inserts spaces instead of focusing next element
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = ta.selectionStart, end = ta.selectionEnd;
        ta.value = ta.value.slice(0, start) + '  ' + ta.value.slice(end);
        ta.selectionStart = ta.selectionEnd = start + 2;
        ta.dispatchEvent(new Event('input'));
      }
    });

    ta.focus();
  } catch(e) {
    m.innerHTML = `<div style="padding:24px"><h2>✏ Editor</h2><p style="color:var(--red);margin-top:12px">Error: ${esc(e.message)}</p>
      <div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button></div></div>`;
  }
}

async function saveEditor() {
  if (!editorState || !editorState.dirty) return;
  const saveBtn = document.getElementById('ed-save');
  const status  = document.getElementById('ed-status');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; }
  if (status)  { status.textContent = 'Saving…'; status.style.color = 'var(--yellow)'; }
  try {
    const r = await fetch('/api/file/write', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ path: editorState.path, content: editorState.content })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Save failed');
    editorState.savedContent = editorState.content;
    editorState.dirty = false;
    const fnEl = document.getElementById('ed-name');
    const name = editorState.path.split('/').pop();
    if (fnEl) { fnEl.textContent = name; fnEl.style.color = ''; }
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Save'; }
    if (status)  { status.textContent = `Saved ${fmtSize(d.size)}`; status.style.color = 'var(--green)'; }
    toast(`✓ Saved: ${name}`, 'ok');
    reload();
  } catch(e) {
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
    if (status)  { status.textContent = 'Save failed'; status.style.color = 'var(--red)'; }
    toast('Save failed: ' + e.message, 'err');
  }
}

function loadPinned() {
  try { return JSON.parse(localStorage.getItem('nova_pinned') || '[]'); }
  catch { return []; }
}
function savePinned(pins) {
  localStorage.setItem('nova_pinned', JSON.stringify(pins));
}
function renderPinnedPlaces() {
  const pins = loadPinned();
  const sec  = document.getElementById('pinned-section');
  const div  = document.getElementById('pinned-list');
  const divider = document.getElementById('pinned-divider');
  if (!sec || !div) return;
  sec.style.display   = pins.length ? '' : 'none';
  if (divider) divider.style.display = pins.length ? '' : 'none';
  div.innerHTML = pins.map((pin, i) =>
    `<div class="sb-item" data-path="${esc(pin.path)}" onclick="nav('${esc(pin.path)}')" style="display:flex;justify-content:space-between;align-items:center;padding-right:4px">
      <span style="display:flex;align-items:center;gap:6px;overflow:hidden">
        <span class="sb-icon">📁</span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(pin.name)}</span>
      </span>
      <span onclick="event.stopPropagation();unpinPlace(${i})" title="Remove" style="color:var(--text3);font-size:14px;padding:2px 4px;border-radius:3px;cursor:pointer;flex-shrink:0;line-height:1" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'">×</span>
    </div>`
  ).join('');
  sidebarActive();
}
function pinToPlaces(p, name) {
  const pins = loadPinned();
  if (pins.find(x => x.path === p)) { toast('Already pinned', 'warn'); return; }
  pins.push({ path: p, name: name || p.split('/').pop() || p });
  savePinned(pins);
  renderPinnedPlaces();
  toast(`📌 Pinned: ${name}`, 'ok');
}
function unpinPlace(idx) {
  const pins = loadPinned();
  const name = pins[idx]?.name || '';
  pins.splice(idx, 1);
  savePinned(pins);
  renderPinnedPlaces();
  toast(`Unpinned: ${name}`, 'ok');
}

// ── AI Agent (plan + execute file operations) ─────────────────
async function aiAgentPlan(dir, instruction) {
  const r = await fetch('/api/ollama/agent-plan', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ dir, prompt: instruction })
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || 'AI planning failed');
  return d.plan || d;
}
async function aiAgentRun(plan) {
  const r = await fetch('/api/ollama/agent-run', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ plan })
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error || 'Execution failed');
  return d;
}
function formatAgentOps(ops) {
  if (!ops || !ops.length) return '<p style="color:var(--text3);font-size:13px">No file operations suggested.</p>';
  return `<div style="max-height:260px;overflow-y:auto;margin-bottom:14px">
    ${ops.map(op => {
      if (op.op === 'mkdir') return `<div style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);font-size:12px;margin-bottom:4px"><span style="color:var(--green);font-family:var(--font-mono)">mkdir</span><span style="font-family:var(--font-mono);color:var(--text2);margin-left:6px">${esc(op.path||'')}</span></div>`;
      if (op.op === 'move') return `<div style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);font-size:12px;margin-bottom:4px"><span style="color:var(--accent2);font-family:var(--font-mono)">move</span><span style="font-family:var(--font-mono);color:var(--text2);margin-left:6px">${esc(op.from||'')}</span><span style="color:var(--text3);margin:0 4px">→</span><span style="font-family:var(--font-mono);color:var(--text2)">${esc(op.to||'')}</span></div>`;
      if (op.op === 'move_filter') return `<div style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);font-size:12px;margin-bottom:4px"><span style="color:var(--blue,#5b9bd5);font-family:var(--font-mono)">move_filter</span><span style="font-family:var(--font-mono);color:var(--text2);margin-left:6px">${esc(op.filter||'')}</span><span style="color:var(--text3);margin:0 6px">in</span><span style="font-family:var(--font-mono);color:var(--text2)">${esc(op.dir||'')}</span><span style="color:var(--text3);margin:0 4px">→</span><span style="font-family:var(--font-mono);color:var(--text2)">${esc(op.target||'')}</span></div>`;
      return `<div style="padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);font-size:12px;margin-bottom:4px"><span style="font-family:var(--font-mono);color:var(--text3)">${esc(op.op||'unknown')}</span></div>`;
    }).join('')}

}

    </div>`;
  setTimeout(() => { const i = document.getElementById('ai-task-input'); if (i) i.focus(); }, 60);
  let latestPlan = null;
  const planDiv = m.querySelector('#ai-task-plan');
  const planBtn = m.querySelector('#ai-task-plan-btn');
  const runBtn  = m.querySelector('#ai-task-run-btn');
  if (!planBtn || !runBtn) return;
  planBtn.addEventListener('click', async () => {

      planDiv.innerHTML = ops.length
        ? `<p style="color:var(--text2);font-size:12px;margin-bottom:6px">Planned operations:</p>${formatAgentOps(ops)}`
        : '<p style="color:var(--text3);font-size:13px">AI found no safe file operations for that request.</p>';
      runBtn.disabled = !ops.length;
    } catch (e) {
      planDiv.innerHTML = `<p style="color:var(--red);font-size:13px">Error: ${esc(e.message)}</p>`;
      runBtn.disabled = true;
    } finally { planBtn.disabled = false; }
  });
  runBtn.addEventListener('click', async () => {
    if (!latestPlan?.operations?.length) return;
    runBtn.disabled = true; planBtn.disabled = true;
    planDiv.innerHTML += `<p style="color:var(--text3);font-size:12px;margin-top:6px">Running plan…</p>`;
    try {
      const res  = await aiAgentRun(latestPlan);
      const errs = (res.results || []).filter(r => r.status !== 'ok');
      if (errs.length) planDiv.innerHTML += `<p style="color:var(--red);font-size:12px;margin-top:4px">Some operations failed: ${errs.length}</p>`;
      closeModal(); reload();
      toast('✦ AI task completed', errs.length ? 'warn' : 'ok');
    } catch (e) {
      planDiv.innerHTML += `<p style="color:var(--red);font-size:12px;margin-top:4px">Run failed: ${esc(e.message)}</p>`;
      runBtn.disabled = false; planBtn.disabled = false;
    }
  });
}

async function aiSemanticSearch(query) {
  if (!query.trim()) return;
  const m = mkModal();
  m.innerHTML = `<h2>✦ Semantic Search</h2>
    <p style="color:var(--text3);font-size:13px;margin-bottom:8px">Searching in: <span style="font-family:var(--font-mono)">${esc(curPath)}</span></p>

  try {
    const r = await fetch('/api/ollama/search', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ query, dir: curPath })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Search failed');
    if (!d.results.length) {
      m.innerHTML = `<h2>✦ Semantic Search</h2><p style="color:var(--text3)">No matching text files found in this folder.</p>
        <div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button></div>`;

      </div>`
    ).join('');
    m.innerHTML = `<h2>✦ Semantic Search</h2>
      <p style="color:var(--text3);font-size:12px;margin-bottom:12px">Query: <em style="color:var(--text2)">${esc(query)}</em></p>
      <div style="max-height:340px;overflow-y:auto;margin-bottom:14px">${rows}</div>
      <div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button></div>`;
  } catch(e) {
    m.innerHTML = `<h2>✦ Semantic Search</h2><p style="color:var(--red)">Error: ${esc(e.message)}</p>
      <div class="modal-row"><button class="mbtn" onclick="closeModal()">Close</button></div>`;
  }
}

function showUpload() { document.getElementById('file-input').click(); }
async function uploadFiles(files) {
  if (!files||!files.length) return;
  const fd = new FormData();
  for (const f of files) fd.append('files', f);
  fd.append('path', curPath);
  fd.append('clientId', wsId);
  showProgressPanel(`Uploading ${files.length} file(s)…`);
  document.getElementById('file-input').value = '';
  // Track upload progress with XHR, but the server saves files in a background
  // job — so even if the browser closes AFTER the HTTP request lands, files are safe.
  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/upload');
  xhr.upload.onprogress = e => {
    if (e.lengthComputable) updatePP(Math.round(e.loaded / e.total * 100), 'uploading');
  };
  xhr.onload = () => {
    try {
      const d = JSON.parse(xhr.responseText);
      if (d.jobId) {
        activeJobs.set(d.jobId, { jobId: d.jobId, status: 'running', percent: 0, phase: 'saving', type: 'upload' });
        updateJobsBadge();
        toast(`↑ Upload received — saving ${files.length} file(s)…`, 'ok');
      } else {
        closeProgress(); toast(`✓ ${files.length} file(s) uploaded`, 'ok');
      }
      reload();
    } catch { closeProgress(); toast(`✓ ${files.length} file(s) uploaded`, 'ok'); reload(); }
  };
  xhr.onerror = () => { closeProgress(); toast('Upload failed', 'err'); };
  xhr.send(fd);
}

let _activeCancelJobId = null;

  _activeCancelJobId = null;

async function cancelActiveJob() {
  if (!_activeCancelJobId) return;
  try {
    await fetch('/api/transfer/cancel', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ jobId: _activeCancelJobId })
    });

function updateProgressPanel(job) {
  const pp = document.getElementById('progress-panel');
  if (pp.style.display === 'none' && (job.status === 'running')) {
    pp.style.display = '';
    const opLabel = job.operation === 'move' ? 'Moving…'
                  : job.type === 'delete' || job.type === 'delete-permanent' ? 'Deleting…'
                  : job.type === 'trash-empty' ? 'Emptying trash…'
                  : job.type === 'upload' ? 'Uploading…'
                  : job.type === 'zip'    ? 'Zipping…'
                  : job.type === 'unzip'  ? 'Extracting…'
                  : 'Copying…';
    document.getElementById('pp-label').textContent = opLabel;
    document.getElementById('pp-spin').style.display = '';
  }
  // Show cancel button for running transfer jobs
  if (job.status === 'running' && job.type === 'transfer') {
    showCancelBtn(job.jobId);
  } else {
    hideCancelBtn();
  }
  document.getElementById('pp-file').textContent = job.currentFile || 'Running on server — safe to close browser';
  document.getElementById('pp-bar').style.width = (job.percent||0)+'%';
  document.getElementById('pp-pct').textContent = (job.percent||0)+'%';
  const phase = job.status === 'done'      ? 'done'
              : job.status === 'error'     ? 'error'
              : job.status === 'cancelled' ? 'cancelled'
              : (job.phase || 'starting');
  document.getElementById('pp-phase').textContent = phase.charAt(0).toUpperCase()+phase.slice(1);
  document.getElementById('pp-phase').className = `phase-pill phase-${phase}`;
  if (job.status !== 'running') document.getElementById('pp-spin').style.display = 'none';
}
function updatePP(pct, phase) {
  document.getElementById('pp-bar').style.width = pct+'%';
  document.getElementById('pp-pct').textContent = pct+'%';
  document.getElementById('pp-phase').textContent = phase;
}
function closeProgress() { document.getElementById('progress-panel').style.display = 'none'; }

document.addEventListener('keydown', ev => {
  if (ev.target.tagName==='INPUT') return;
  if (ev.ctrlKey||ev.metaKey) {
    if (ev.key==='c') copySel();
    if (ev.key==='x') cutSel();
    if (ev.key==='v') doPaste();
    if (ev.key==='a') { ev.preventDefault(); filtered.forEach(e=>selected.add(e.path)); renderFiles(); selUI(); }
  }
  if (ev.key==='Delete'&&selected.size) delSel();
  if (ev.key==='F5') { ev.preventDefault(); reload(); }
  if (ev.key==='Escape') { selected.clear(); renderFiles(); selUI(); document.querySelectorAll('.ctxmenu').forEach(e=>e.remove()); }
  if (ev.key==='Backspace'&&!ev.target.closest('input')) { ev.preventDefault(); goBack(); }
});

    const r = await fetch('/api/transfer/cancel', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ jobId })
    });
    if (!r.ok) { const d = await r.json(); toast('⚠ ' + (d.error || 'Cancel failed'), 'err'); btn.textContent = 'Cancel'; btn.disabled = false; }
    else toast('⏹ Cancelling…', 'ok');
  } catch (e) { toast('Cancel failed: ' + e.message, 'err'); btn.textContent = 'Cancel'; btn.disabled = false; }
}

async function resumeTransfer(jobId) {
  closeModal();
  try {
    const r = await fetch('/api/transfer/resume', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jobId, clientId: wsId })
    });
    const d = await r.json();
    if (!r.ok) { toast('⚠ ' + (d.error || 'Resume failed'), 'err'); return; }
    if (d.message) { toast('✓ ' + d.message, 'ok'); return; } // already complete
    toast(`⟳ Resuming transfer (${d.remainingFiles} file(s) left)`, 'ok');
    activeJobs.set(d.jobId, { jobId: d.jobId, status: 'running', percent: 0, phase: 'resuming', type: 'transfer' });
    showProgressPanel('Resuming…');
    updateJobsBadge();
  } catch (e) { toast('⚠ Resume failed: ' + e.message, 'err'); }
}

// ═══════════════════════════════════════════
// RESTORE RUNNING JOBS ON PAGE LOAD/REOPEN
// ═══════════════════════════════════════════
async function restoreRunningJobs() {
  try {
    const r = await fetch('/api/jobs');
    const d = await r.json();
    // Show ALL running jobs — wsId is now in localStorage so it persists
    // across browser restarts; jobs started before the browser closed will
    // still match. But even if the wsId changed we still show them all.
    const running = (d.jobs || []).filter(j => j.status === 'running');
    if (!running.length) return;
    for (const job of running) {
      activeJobs.set(job.jobId, job);
    }
    const latest = running.sort((a,b) => new Date(b.startedAt)-new Date(a.startedAt))[0];
    updateProgressPanel(latest);
    // Re-attach cancel button if the job supports it
    if (latest.type === 'transfer') showCancelBtn(latest.jobId);
    updateJobsBadge();
    toast(`⟳ Reconnected to ${running.length} running job(s)`, 'ok');
  } catch {}
}

initWS();
restoreRunningJobs();
// Sync view toggle buttons with persisted mode
document.getElementById('vgrid').classList.toggle('on', viewMode === 'grid');
document.getElementById('vlist').classList.toggle('on', viewMode === 'list');
// Honour ?path= from PWA shortcuts or shared URLs
const _startPath = new URLSearchParams(location.search).get('path') || '/';
nav(_startPath);
renderPinnedPlaces();
loadDisk();
loadTrash();
setInterval(loadDisk, 30000);
setInterval(loadTrash, 8000);

// Poll running jobs so progress panel updates even if WS reconnects or browser was reopened
setInterval(async () => {
  const hasActive = [...activeJobs.values()].some(j=>j.status==='running');
  if (!hasActive) return;
  try {
    const r = await fetch('/api/jobs');
    const d = await r.json();
    for (const job of d.jobs) {
      if (job.status==='running' || activeJobs.has(job.jobId)) {
        activeJobs.set(job.jobId, job);
        updateProgressPanel(job);
        // Handle completion detected via poll (in case WS missed it)
        const terminal = job.status === 'done' || job.status === 'error' || job.status === 'cancelled';
        if (terminal && !finishedJobs.has(job.jobId)) {
          finishedJobs.add(job.jobId);
          hideCancelBtn();
          if (job.status === 'done') {
            setTimeout(() => closeProgress(), 2500);
            const label = job.type === 'delete' || job.type === 'delete-permanent' ? '🗑 Delete complete'
                        : job.type === 'trash-empty' ? '🗑 Trash emptied'
                        : job.type === 'upload'  ? '✓ Upload saved'
                        : job.type === 'zip'     ? '🗜 Zip complete'
                        : job.type === 'unzip'   ? '📦 Extracted'
                        : `✓ ${job.operation === 'move' ? 'Move' : 'Copy'} complete`;
            toast(label, 'ok');
            reload(); loadTrash();
          } else if (job.status === 'cancelled') {
            const cancelMsg2 = job.type === 'zip'   ? '⏹ Zip cancelled — open Jobs to resume'
                             : job.type === 'unzip' ? '⏹ Extract cancelled — open Jobs to resume'
                             : '⏹ Transfer cancelled — open Jobs to resume';
            toast(cancelMsg2, 'warn');
            reload();
          } else {
            toast('⚠ ' + (job.error || 'Operation failed'), 'err');
          }
        }
      }
    }
    updateJobsBadge();
  } catch {}
}, 2000);
</script>
