<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nova — Sign In</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1916;
            --surface: #211f1c;
            --surface2: #2a2825;
            --border: rgba(255,240,220,0.08);
            --text: #f0e8dc;
            --text2: #a89880;
            --text3: #6a5e50;
            --accent: #c4663a;
            --accent2: #e07848;
            --radius: 12px;
            --font-serif: 'Lora', ui-serif, Georgia, Cambria, 'Times New Roman', Times, serif;
            --font-sans: 'Inter', 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(196,102,58,0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(196,102,58,0.03) 0%, transparent 40%);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: var(--accent);
            color: #fff;
            font-family: var(--font-serif);
            font-size: 32px;
            font-weight: 600;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 8px 16px rgba(196,102,58,0.25);
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        p.welcome {
            color: var(--text3);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text3);
            margin-bottom: 6px;
            font-weight: 600;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--accent);
            background: #2f2c28;
            box-shadow: 0 0 0 4px rgba(196,102,58,0.1);
        }

        .options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text2);
            cursor: pointer;
            user-select: none;
        }

        .remember input {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(196,102,58,0.2);
        }

        .btn:hover {
            background: var(--accent2);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(196,102,58,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        #error {
            margin-top: 16px;
            font-size: 13px;
            color: #d95f5f;
            min-height: 20px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        /* Standard browser form support for password saving */
        form { width: 100%; }

    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">N</div>
        <h1>Nova</h1>
        <p class="welcome">Enter your credentials to manage your files.</p>
        
        <form id="login-form">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            
            <div class="options">
                <label class="remember">
                    <input type="checkbox" id="remember" name="remember">
                    Remember me
                </label>
            </div>

            <button type="submit" class="btn">Sign In</button>
        </form>

        <div id="error"></div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const errDiv = document.getElementById('error');

        function getCsrf() {
            const matches = document.cookie.match(/nova_csrf_token=([^;]+)/);
            return matches ? matches[1] : '';
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            errDiv.style.opacity = '0';
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            try {
                const r = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Nova-CSRF': getCsrf()
                    },
                    body: JSON.stringify({ username, password, remember })
                });
                const d = await r.json();
                
                if (r.ok) {
                    window.location.reload();
                } else {
                    errDiv.textContent = d.error || 'Login failed';
                    errDiv.style.opacity = '1';
                }
            } catch (e) {
                errDiv.textContent = 'Server unavailable';
                errDiv.style.opacity = '1';
            }
        };
    </script>
</body>
</html>
