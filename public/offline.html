<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova — Offline</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root { --bg:#1a1916; --surface:#232320; --border:#3a3834; --text:#e8e4de; --text3:#6b6760; --accent:#c4663a; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
           display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:48px 40px; max-width:380px; width:100%; }
    .icon { font-size:56px; margin-bottom:20px; }
    h1 { font-size:22px; font-weight:600; margin-bottom:10px; }
    p { color:var(--text3); font-size:14px; line-height:1.6; margin-bottom:28px; }
    button { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:12px 28px;
             font-size:14px; font-weight:600; cursor:pointer; transition:opacity .15s; }
    button:hover { opacity:.85; }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--text3); margin-bottom:24px; }
    .dot.online { background:#5fa85a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📂</div>
    <div class="dot" id="dot"></div>
    <h1>You're offline</h1>
    <p>Nova couldn't reach the server. Check your network connection and try again.</p>
    <button onclick="tryReconnect()">Try again</button>
  </div>
  <script>
    function updateDot() {
      document.getElementById('dot').classList.toggle('online', navigator.onLine);
    }
    function tryReconnect() {
      if (navigator.onLine) { window.location.href = '/'; }
      else { document.querySelector('p').textContent = 'Still offline. Please check your connection.'; }
    }
    window.addEventListener('online',  () => { updateDot(); window.location.href = '/'; });
    window.addEventListener('offline', updateDot);
    updateDot();
  </script>
</body>
</html>
