<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f09060" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c4663a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0a070"/>
      <stop offset="60%" stop-color="#c4663a"/>
      <stop offset="100%" stop-color="#8b3a1a"/>
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle glow -->
  <circle cx="32" cy="32" r="30" fill="url(#glow)"/>
  <!-- Hexagon outline -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18"
    fill="none" stroke="#c4663a" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Inner hexagon -->
  <polygon points="32,11 50,21.5 50,42.5 32,53 14,42.5 14,21.5"
    fill="#1a1916" stroke="#c4663a" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- N letter mark -->
  <text x="32" y="41" font-family="'IBM Plex Mono', monospace" font-size="26"
    font-weight="500" fill="url(#core)" text-anchor="middle"
    filter="url(#blur-glow)">N</text>
  <!-- Accent dot -->
  <circle cx="46" cy="20" r="3" fill="#f09060" opacity="0.8"/>
  <circle cx="46" cy="20" r="5" fill="#f09060" opacity="0.2"/>
</svg>
