<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f09060" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c4663a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0a070"/>
      <stop offset="60%" stop-color="#c4663a"/>
      <stop offset="100%" stop-color="#8b3a1a"/>
    </radialGradient>
    <linearGradient id="textgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0e8dc"/>
      <stop offset="100%" stop-color="#a89880"/>
    </linearGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#c4663a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Icon group, centered vertically at x=60 -->
  <!-- Outer glow -->
  <circle cx="60" cy="60" r="52" fill="url(#glow)"/>
  <!-- Hexagon outer -->
  <polygon points="60,10 98,32 98,76 60,98 22,76 22,32"
    fill="none" stroke="#c4663a" stroke-width="1.8" stroke-opacity="0.55"/>
  <!-- Hexagon inner fill -->
  <polygon points="60,18 91,36 91,72 60,90 29,72 29,36"
    fill="#1a1916" stroke="#c4663a" stroke-width="0.8" stroke-opacity="0.25"/>
  <!-- N lettermark -->
  <text x="60" y="76" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="48"
    font-weight="500" fill="url(#core)" text-anchor="middle"
    filter="url(#blur-glow)">N</text>
  <!-- Accent dot -->
  <circle cx="88" cy="34" r="4.5" fill="#f09060" opacity="0.85"/>
  <circle cx="88" cy="34" r="7" fill="#f09060" opacity="0.18"/>

  <!-- Wordmark -->
  <text x="130" y="68" font-family="'Georgia', 'Times New Roman', serif" font-size="52"
    font-weight="700" letter-spacing="-1" fill="#f0e8dc" filter="url(#soft-shadow)">nova</text>
  <!-- Tagline -->
  <text x="132" y="92" font-family="'Courier New', monospace" font-size="13"
    font-weight="400" letter-spacing="2.5" fill="#a89880">FILE MANAGER</text>
</svg>
